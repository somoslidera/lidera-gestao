<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1D3573" />
<title>Flow · by Lidera</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#1D3573;--navy-700:#172b5e;--navy-900:#10203f;
  --gold:#A48A57;--gold-soft:#C2A875;--off:#F2F2F2;
  --bg:#F5F6F9;--card:#FFFFFF;--line:#E6E8EE;--ink:#1B2235;--muted:#6B7384;--soft:#9AA1B1;
  --green:#1E9E6A;--green-bg:#E5F4EC;--red:#D2483F;--red-bg:#FBE9E7;
  --amber:#C9892A;--amber-bg:#FBF1DE;--blue-bg:#E9EDF7;
  --radius:14px;--shadow:0 1px 2px rgba(16,32,63,.04),0 8px 24px rgba(16,32,63,.06);--shadow-lg:0 12px 40px rgba(16,32,63,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;height:100vh;overflow:hidden}
.serif{font-family:'Fraunces',Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}

.sidebar{width:248px;flex-shrink:0;background:#1D3573;color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:26px 24px 22px;flex-shrink:0}
.brand .wm{font-size:30px;font-weight:600;letter-spacing:-.5px;line-height:1}
.brand .sub{font-size:9px;letter-spacing:2.6px;color:var(--gold-soft);margin-top:7px;font-weight:600}
.brand .prog{font-size:11px;color:rgba(255,255,255,.5);margin-top:12px}
.nav{padding:6px 14px;flex:1;overflow-y:auto}
.nav .lbl{font-size:10px;letter-spacing:1.6px;color:rgba(255,255,255,.4);padding:12px 12px 5px;font-weight:600}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.78);text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:2px;transition:.15s;position:relative;cursor:pointer;user-select:none}
.nav a svg{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav a:hover{background:rgba(255,255,255,.07);color:#fff}
.nav a.active{background:rgba(255,255,255,.12);color:#fff}
.nav a.active::before{content:"";position:absolute;left:-14px;top:7px;bottom:7px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav a.active svg{opacity:1;color:var(--gold-soft)}
.side-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.45);flex-shrink:0}
.side-foot #footName{font-size:15px;color:rgba(255,255,255,.92);font-weight:600}
.side-foot b{color:rgba(255,255,255,.8);font-weight:600}

.main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{min-height:64px;flex-shrink:0;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 28px;gap:16px;z-index:20}
.topbar .menu-btn{display:none}
.topbar h1{font-size:19px;font-weight:600;letter-spacing:-.3px;flex:1}
.content{padding:28px 36px;max-width:1560px;width:100%;margin:0 auto;flex:1;min-height:0;overflow-y:auto}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.15s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-700)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#937A4A}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{border-color:var(--soft);background:#FAFBFC}
.btn-sm{padding:7px 12px;font-size:12.5px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:22px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.section-head .ttl{font-size:15px;font-weight:600}
.section-head .desc{font-size:13px;color:var(--muted);margin-top:2px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.kpi .ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.kpi .ic svg{width:20px;height:20px}
.kpi .k-lbl{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.2px;text-transform:uppercase}
.kpi .k-val{font-size:24px;font-weight:700;letter-spacing:-.6px;margin-top:2px;font-family:'Fraunces',serif;line-height:1.05}
.kpi .k-sub{font-size:11.5px;margin-top:4px;display:flex;align-items:center;gap:5px;font-weight:600;color:var(--soft)}
/* com ícone: layout horizontal (ícone à esquerda) — melhor uso da largura, menos espaço vazio */
.kpi:has(.ic){display:grid;grid-template-columns:44px 1fr;column-gap:15px;align-items:center;padding:15px 18px}
.kpi:has(.ic) .ic{grid-column:1;grid-row:1 / 4;align-self:center;margin-bottom:0}
.kpi:has(.ic) .k-lbl{grid-column:2;grid-row:1}
.kpi:has(.ic) .k-val{grid-column:2;grid-row:2;margin:1px 0}
.kpi:has(.ic) .k-sub{grid-column:2;grid-row:3;margin-top:2px}
.trend-up{color:var(--green)}.trend-down{color:var(--red)}
.ic-navy{background:var(--blue-bg);color:var(--navy)}.ic-gold{background:var(--amber-bg);color:var(--amber)}
.ic-green{background:var(--green-bg);color:var(--green)}.ic-red{background:var(--red-bg);color:var(--red)}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--soft);font-weight:600;padding:11px 13px;border-bottom:1px solid var(--line)}
tbody td{padding:12px 13px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAFBFC}
/* compactação SÓ nas tabelas de dados (.scroll-x: Insumos, Estoque, CMV, Equipe…) e no DRE. Dashboard e painel admin ficam no tamanho normal */
.scroll-x thead th{padding:8px 13px}
.scroll-x tbody td,.dre-table tbody td{padding:7px 13px}
.scroll-x tbody td .input{padding:7px 10px;font-size:13px}
.scroll-x tbody td .money-inp{padding-left:30px}
.scroll-x tbody td .money-pre{font-size:12px}
.scroll-x tbody td .icon-btn{width:30px;height:30px}
.num{text-align:right;font-variant-numeric:tabular-nums}
th.num{text-align:right}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.tag-green{background:var(--green-bg);color:var(--green)}.tag-red{background:var(--red-bg);color:var(--red)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}.tag-navy{background:var(--blue-bg);color:var(--navy)}
.tag-gray{background:#EEF0F4;color:var(--muted)}.tag-gold{background:var(--amber-bg);color:var(--gold)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;color:var(--muted)}
.icon-btn:hover{color:var(--navy);border-color:var(--soft)}
.icon-btn.del:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}
.icon-btn svg{width:15px;height:15px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty svg{width:42px;height:42px;opacity:.3;margin-bottom:14px}
.empty .t{font-weight:600;color:var(--ink);font-size:15px}
.empty .d{font-size:13.5px;margin-top:5px}

.modal-overlay{position:fixed;inset:0;background:rgba(16,32,63,.45);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:500;padding:34px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:18px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);animation:pop .18s ease}
.modal.wide{max-width:820px}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:20px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:17px;font-weight:600;font-family:'Fraunces',serif}
.modal-head .x{width:32px;height:32px;border-radius:8px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-head .x:hover{background:#F0F1F5;color:var(--ink)}
.modal-body{padding:22px 26px;max-height:66vh;overflow-y:auto}
.modal-foot{padding:16px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:#FAFBFC;border-radius:0 0 18px 18px}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.field .hint{font-size:11.5px;color:var(--soft);font-weight:400;margin-left:4px}
.input,select.input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;color:var(--ink);transition:.15s}
.input:focus,select.input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(29,53,115,.1)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.switch-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:15px;background:#FAFBFC}
.switch{width:42px;height:24px;border-radius:14px;background:#CBD2DE;position:relative;transition:.2s;flex-shrink:0}
.switch.on{background:var(--navy)}
.switch i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.switch.on i{left:21px}

.comp-row{display:grid;grid-template-columns:24px 1fr 86px 80px 32px;gap:9px;align-items:center;margin-bottom:9px}
.comp-row .ctype{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.ctype-i{background:var(--blue-bg);color:var(--navy)}.ctype-f{background:var(--amber-bg);color:var(--gold)}
.comp-row .ccost{font-size:12.5px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}
.mini-del{width:32px;height:36px;border-radius:9px;border:1px solid var(--line);color:var(--soft);display:flex;align-items:center;justify-content:center}
.mini-del:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}

.calc-box{background:linear-gradient(135deg,#1D3573,#172b5e);color:#fff;border-radius:14px;padding:18px;margin-top:6px}
.calc-box .line{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.1)}
.calc-box .line:last-child{border-bottom:none}
.calc-box .line span:first-child{color:rgba(255,255,255,.72)}
.calc-box .line b{font-weight:600;font-variant-numeric:tabular-nums}
.calc-box .big b{font-size:17px;color:var(--gold-soft);font-family:'Fraunces',serif}
.chan-tabs{display:flex;gap:8px;margin:14px 0 10px}
.chan-tabs button{flex:1;padding:9px;border-radius:9px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--muted)}
.chan-tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}

.matrix-wrap{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;align-items:start}
.matrix{position:relative;aspect-ratio:1/1;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.quad{position:absolute;width:50%;height:50%;display:flex;align-items:flex-start;padding:12px 14px}
.quad .ql{font-size:12px;font-weight:700}.quad .qd{font-size:10.5px;opacity:.7;font-weight:500}
.q-star{background:rgba(30,158,106,.07)}.q-horse{background:rgba(29,53,115,.06)}
.q-puzzle{background:rgba(201,137,42,.08)}.q-dog{background:rgba(210,72,63,.06)}
.matrix .axis-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
.matrix .axis-h{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--line)}
.dot{position:absolute;width:32px;height:32px;border-radius:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.18);transition:.15s}
.dot:hover{transform:translate(-50%,-50%) scale(1.18);z-index:5}
.axis-label{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;font-weight:600}
.axis-label-y{position:absolute;left:-8px;top:50%;transform:rotate(-90deg) translateX(50%);transform-origin:left;font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}

.dre-table .grp td{font-weight:700;background:#FAFBFC}
.dre-table .ind td:first-child{padding-left:28px;color:var(--muted)}
.dre-table .total td{font-weight:700;border-top:2px solid var(--navy);font-size:14.5px}
.bar{height:8px;border-radius:5px;background:#EEF0F4;overflow:hidden;margin-top:6px}
.bar > i{display:block;height:100%;border-radius:5px}

.chart{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:10px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.chart .col .bw{width:100%;max-width:38px;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.chart .col .b{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#2a4488,#1D3573)}
.chart .col .cl{font-size:11px;color:var(--muted);font-weight:500;text-align:center}
.chart .col .cv{font-size:10.5px;color:var(--soft);font-variant-numeric:tabular-nums}

.alert{display:flex;gap:11px;align-items:flex-start;padding:12px 14px;border-radius:11px;margin-bottom:9px;font-size:13px}
.alert svg{width:17px;height:17px;flex-shrink:0;margin-top:1px}
.alert-red{background:var(--red-bg);color:#9e342c}.alert-amber{background:var(--amber-bg);color:#8a5e1c}
.alert-green{background:var(--green-bg);color:#13633f}
.alert b{font-weight:700}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-900);color:#fff;padding:13px 22px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;display:flex;align-items:center;gap:9px;animation:pop .2s}
.toast svg{width:17px;height:17px;color:var(--gold-soft)}
.pill-filter{display:flex;gap:6px;flex-wrap:wrap}
.pill-filter button{padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:600;background:#fff;border:1px solid var(--line);color:var(--muted)}
.pill-filter button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.dash-pill{display:flex;flex-direction:column;gap:1px;padding:7px 14px;border:1px solid var(--line);border-radius:11px;background:#FAFBFC;min-width:96px}
.dash-pill span{font-size:10.5px;color:var(--soft);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.dash-pill b{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.legend{display:flex;flex-direction:column;gap:9px}
.legend .li{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:11px}
.legend .sw{width:13px;height:13px;border-radius:4px;flex-shrink:0;margin-top:2px}
.legend .li b{font-size:13px;display:block}.legend .li small{font-size:11.5px;color:var(--muted)}
.health-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.be-ring{display:flex;align-items:center;gap:18px}
.be-num{font-size:30px;font-weight:700;font-family:'Fraunces',serif;letter-spacing:-.5px}

@media(max-width:900px){
  body{height:auto;overflow:auto}
  .main{height:auto;overflow:visible}
  .content{overflow:visible}
  .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:.25s;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .topbar .menu-btn{display:flex;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);align-items:center;justify-content:center;color:var(--ink)}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .matrix-wrap{grid-template-columns:1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr!important}
  .buffet-grid{grid-template-columns:1fr!important}
  .content{padding:16px}
  .backdrop{position:fixed;inset:0;background:rgba(16,32,63,.4);z-index:40}
}
@media(max-width:560px){.kpi-grid{grid-template-columns:1fr}.comp-row{grid-template-columns:24px 1fr 70px 64px 30px}}
.hidden{display:none!important}
.scroll-x{overflow-x:auto}
/* ===== Auth / Admin (SaaS) ===== */
#authScreen{position:fixed;inset:0;z-index:300;background:#1D3573;display:flex;align-items:center;justify-content:center;padding:20px}
#authScreen .auth-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:34px 30px}
#authScreen .auth-wm{font-family:'Fraunces',serif;font-size:34px;font-weight:600;color:var(--navy);text-align:center}
#authScreen .auth-by{font-size:13px;color:var(--gold);text-align:center;margin-top:-2px;margin-bottom:22px}
.cloud-banner{background:var(--gold);color:#fff;font-size:12.5px;font-weight:600;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.cloud-banner button{background:rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600}
.admin-wrap{max-width:1240px;margin:0 auto;padding:28px 36px}
.client-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);transition:.15s}
.client-card:hover{border-color:var(--gold-soft)}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* ===== marca Flow + botão de tema ===== */
.brand .by{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--gold-soft);letter-spacing:0;margin-left:4px}
.theme-toggle{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;cursor:pointer}
.theme-toggle:hover{color:var(--gold);border-color:var(--gold-soft)}
.theme-toggle svg{width:18px;height:18px}
/* toolbar superior: botões alinhados, sem sobreposição */
#topActions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
/* toggle de tema ao lado da marca (sidebar navy) */
.brand-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand .theme-toggle{width:34px;height:34px;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.20);color:rgba(255,255,255,.88)}
.brand .theme-toggle:hover{color:var(--gold);border-color:var(--gold-soft);background:rgba(255,255,255,.15)}

/* ===== TEMA ESCURO (mantém identidade PLL: navy + dourado) ===== */
body.dark{
  --bg:#0E1626;--card:#172139;--line:#283450;--ink:#E8EDF6;--muted:#9DA9C2;--soft:#6B7790;
  --navy:#4567A8;--navy-700:#3A5790;--navy-900:#0A1224;
  --gold:#C2A875;--gold-soft:#D6BE8C;
  --green:#36C088;--red:#E76B61;--amber:#DDA64E;
  --green-bg:rgba(54,192,136,.16);--red-bg:rgba(231,107,97,.16);--amber-bg:rgba(221,166,78,.16);--blue-bg:rgba(69,103,168,.24);
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.4);--shadow-lg:0 16px 48px rgba(0,0,0,.55);
}
body.dark .topbar{background:rgba(16,22,38,.82)}
body.dark .input,body.dark select.input,body.dark textarea.input{background:#0F1A30;color:var(--ink);border-color:var(--line)}
body.dark .input::placeholder{color:#5C6882}

  body{display:block;background:#fff}
  .main{display:block}

/* =====================================================================
   UX v2 — polimento premium (gradientes navy→dourado, micro-interações)
   ===================================================================== */

/* fundo com profundidade sutil */
body{background:radial-gradient(1100px 520px at 85% -10%, rgba(29,53,115,.06), transparent 60%), var(--bg)}
body.dark{background:radial-gradient(1100px 520px at 85% -10%, rgba(164,138,87,.07), transparent 60%), var(--bg)}
::selection{background:rgba(164,138,87,.32)}

/* scrollbar discreta e themeada */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C7CEDC;border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#AEB8CC;border:2px solid transparent;background-clip:content-box}
body.dark ::-webkit-scrollbar-thumb{background:#33415F;border:2px solid transparent;background-clip:content-box}

/* sidebar: navy com profundidade + marca em gradiente */
.sidebar{background:linear-gradient(180deg,#234180 0%,#1D3573 52%,#16294F 100%)}
.brand .wm{background:linear-gradient(120deg,#FFFFFF 35%,var(--gold-soft));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .by{-webkit-text-fill-color:var(--gold-soft)}
.nav .lbl{color:rgba(214,190,140,.55)}
.nav a.active{background:linear-gradient(90deg,rgba(255,255,255,.17),rgba(255,255,255,.05))}

/* topbar com fio dourado */
.topbar{position:relative}
.topbar::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--gold) 0%,rgba(164,138,87,.25) 35%,transparent 70%);pointer-events:none}

/* botões: gradiente + elevação */
.btn{transition:transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease}
.btn:active{transform:translateY(0) scale(.97)}
.btn-primary{background:linear-gradient(135deg,#2B4C99 0%,#1D3573 100%);box-shadow:0 2px 10px rgba(29,53,115,.28)}
.btn-primary:hover{background:linear-gradient(135deg,#33549F 0%,#24408A 100%);transform:translateY(-1px);box-shadow:0 6px 16px rgba(29,53,115,.36)}
.btn-gold{background:linear-gradient(135deg,#C8AE7B 0%,#A48A57 100%);box-shadow:0 2px 10px rgba(164,138,87,.32)}
.btn-gold:hover{background:linear-gradient(135deg,#CDB484 0%,#94793F 100%);transform:translateY(-1px);box-shadow:0 6px 16px rgba(164,138,87,.4)}
body.dark .btn-primary{background:linear-gradient(135deg,#54719F 0%,#3A5790 100%)}
body.dark .btn-primary:hover{background:linear-gradient(135deg,#5F7DAD 0%,#44639E 100%)}

/* KPIs e cards de cliente: vida no hover + filete de valor */
.kpi,.client-card{transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;position:relative;overflow:hidden}
.kpi:hover,.client-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--gold-soft)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--gold));opacity:0;transition:opacity .2s}
.kpi:hover::after{opacity:1}
.client-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--gold))}

/* HERO do dashboard: navy premium com brilho dourado */
.hero-card{background:linear-gradient(135deg,#24417F 0%,#1D3573 55%,#16294F 100%);border:none;color:#fff;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;top:-60px;right:-40px;width:340px;height:220px;background:radial-gradient(closest-side,rgba(194,168,117,.28),transparent);pointer-events:none}
.hero-card .hero-sub{font-size:13px;color:rgba(255,255,255,.72)}
.hero-card .dash-pill{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.18)}
.hero-card .dash-pill span{color:rgba(255,255,255,.62)}
.hero-card .dash-pill b{color:#fff}
body.dark .hero-card{background:linear-gradient(135deg,#22386B 0%,#16244A 60%,#0E1934 100%)}
@media print{.hero-card{background:#fff!important;color:#15191f!important;border:1px solid #ccc!important}.hero-card .hero-sub{color:#555!important}}

/* tela de login: fundo premium + cartão com assinatura dourada */
#authScreen{background:radial-gradient(900px 520px at 72% -8%, rgba(194,168,117,.25), transparent 55%), linear-gradient(160deg,#27457f 0%,#1D3573 52%,#101F42 100%)}
#authScreen .auth-card{border-top:4px solid var(--gold);box-shadow:0 24px 70px rgba(5,12,30,.45)}
#authScreen .auth-wm{background:linear-gradient(120deg,var(--navy),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

/* alertas legíveis no tema escuro */
body.dark .alert-green{color:#8FDDBA}
body.dark .alert-amber{color:#EBC98B}
body.dark .alert-red{color:#F2A8A1}

/* input de moeda com R$ na frente */
.money-wrap{position:relative}
.money-wrap .money-pre{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--soft);font-weight:600;font-size:13px;pointer-events:none}
.money-wrap .money-inp{padding-left:36px;text-align:left}

/* campos numéricos sem as setinhas (spinner) */
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}

/* botão editar dados (rodapé sidebar) */
.side-edit{display:block;width:100%;text-align:left;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.92);font-size:12.5px;font-weight:600;padding:9px 11px;border-radius:9px;cursor:pointer;margin-bottom:12px;transition:.15s}
.side-edit:hover{background:rgba(194,168,117,.22);border-color:var(--gold-soft);color:#fff}

/* WIZARD / ANAMNESE */
#wizScreen{position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;background:radial-gradient(900px 520px at 78% -10%,rgba(194,168,117,.20),transparent 55%),linear-gradient(160deg,#27457f 0%,#1D3573 52%,#101F42 100%);overflow:auto}
.wiz-top{display:flex;align-items:center;gap:16px;padding:18px 28px;color:#fff}
.wiz-top .wm{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
.wiz-top .wm .by{font-family:'Inter',sans-serif;font-size:12px;color:var(--gold-soft);margin-left:4px}
.wiz-step-lbl{margin-left:auto;font-size:12.5px;color:rgba(255,255,255,.8);font-weight:600;letter-spacing:.4px}
.wiz-prog{height:5px;background:rgba(255,255,255,.14);margin:0 28px;border-radius:99px;overflow:hidden}
.wiz-prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#E7D3A8);border-radius:99px;transition:width .3s}
.wiz-grupo{padding:6px 28px 0;color:var(--gold-soft);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.wiz-body{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:18px 28px 30px}
.wiz-card{width:100%;max-width:920px;background:var(--card);border-radius:18px;box-shadow:0 24px 70px rgba(5,12,30,.45);border-top:4px solid var(--gold);overflow:hidden;display:grid;grid-template-columns:300px 1fr}
.wiz-ctx{background:linear-gradient(160deg,#24417F,#16294F);color:#fff;padding:26px 24px}
.wiz-ctx .tag{font-size:11px;letter-spacing:1.5px;color:var(--gold-soft);font-weight:700}
.wiz-ctx h2{font-family:'Fraunces',serif;font-size:23px;font-weight:600;margin:8px 0 10px;line-height:1.15}
.wiz-ctx p{font-size:13.5px;color:rgba(255,255,255,.8);line-height:1.55}
.wiz-resp{padding:26px 26px 22px}
.wiz-resp .resp-lbl{font-size:11px;letter-spacing:1.4px;color:var(--soft);font-weight:700;text-transform:uppercase;margin-bottom:14px}
.wiz-foot{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);padding:16px 26px;background:var(--bg)}
.wiz-foot .spacer{flex:1}
.wiz-sub{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;position:relative;background:var(--card)}
.wiz-sub .sub-h{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.wiz-sub .mini-del{position:absolute;top:10px;right:10px}
.wiz-calc{background:var(--amber-bg);border:1px solid var(--gold-soft);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:6px}
.wiz-seg{display:flex;gap:8px;flex-wrap:wrap}
.wiz-seg button{flex:1;min-width:90px;padding:11px 10px;border:1px solid var(--line);border-radius:11px;background:var(--card);font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;transition:.15s}
.wiz-seg button.on{background:linear-gradient(135deg,#2B4C99,#1D3573);color:#fff;border-color:transparent}
@media(max-width:720px){.wiz-card{grid-template-columns:1fr}.wiz-ctx{padding:20px}}
body.dark .wiz-foot{background:#0E1626}

/* folha de contagem de estoque (impressão em 2 colunas) */
#printArea{display:none}
@media print{
  @page{margin:0}
  body.print-contagem .sidebar,body.print-contagem .main,body.print-contagem #modalRoot,body.print-contagem #toastRoot{display:none!important}
  body.print-contagem #printArea{display:block!important;padding:12mm}
  #printArea{color:#000;font-family:'Inter',sans-serif}
  #printArea .ct-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #000;padding-bottom:6px}
  #printArea .ct-note{font-size:10.5px;color:#444;margin:6px 0 9px}
  #printArea .count-cols{column-count:2;column-gap:22px}
  #printArea .cg{font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.4px;background:#eee;padding:3px 6px;margin:7px 0 2px;break-inside:avoid;break-after:avoid}
  #printArea .ci{display:flex;align-items:center;gap:8px;border-bottom:1px solid #ccc;padding:4px 2px;break-inside:avoid;font-size:12px}

/* ===== Ficha técnica — modal em 2 painéis ===== */
.modal.fichamodal{max-width:1020px;overflow:hidden}
.ficha-split{display:flex;align-items:stretch;min-height:560px}
.fx-left{width:38%;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#FAFBFC}
body.dark .fx-left{background:#121B30}
.fx-right{width:62%;display:flex;flex-direction:column;min-width:0}
.fx-left-body{padding:22px 20px;overflow-y:auto;flex:1;max-height:78vh;display:flex;flex-direction:column}
.fx-right-body{padding:6px 26px 22px;overflow-y:auto;flex:1;max-height:68vh}
.fx-head{padding:22px 26px 6px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.fx-head h3{font-size:21px;font-weight:700;font-family:'Fraunces',serif;line-height:1.15}
.fx-head .x{width:34px;height:34px;border-radius:9px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fx-head .x:hover{background:#F0F1F5;color:var(--ink)}
body.dark .fx-head .x:hover{background:#222F4E}
.fx-foot{padding:14px 26px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;background:#FAFBFC;border-radius:0 0 16px 0}
body.dark .fx-foot{background:#121B30}
.fx-sublabel{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--soft);font-weight:700}
.ins-results{margin:6px 0 4px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--card)}
.ins-results div{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line)}
.ins-results div:last-child{border-bottom:0}
.ins-results div:hover{background:var(--navy);color:#fff}
.ins-card{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:8px;background:var(--card)}
.ins-card .pen{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--soft);flex-shrink:0;cursor:pointer}
.ins-card .pen:hover{color:var(--navy);border-color:var(--navy)}
.ins-card .info{flex:1;min-width:0}
.ins-card .info b{font-size:13.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ins-card .info .sub{font-size:11.5px;color:var(--soft);display:flex;align-items:center;gap:5px;margin-top:2px}
.ins-card .info .sub .cst{color:var(--green);font-weight:600}
.ins-card .qy{width:58px;padding:6px 8px!important;text-align:center;font-size:12.5px!important}
.ins-card.edit{flex-direction:column;align-items:stretch;border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.ins-concluir{color:var(--gold);font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0}
.ins-rm{color:var(--red);font-size:12px;font-weight:600;background:var(--red-bg);border-radius:8px;padding:7px 11px;cursor:pointer;flex-shrink:0}
body.dark .ins-rm{background:rgba(210,72,63,.16)}
.ins-add{margin-top:auto;display:flex;align-items:center;gap:13px;border-top:1px solid var(--line);padding:16px 2px 2px;cursor:pointer}
.ins-add:hover .plus{border-color:var(--navy);color:var(--navy)}
.ins-add .plus{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--soft);flex-shrink:0}
.ins-add b{font-size:13.5px;display:block}
.ins-add small{font-size:11.5px;color:var(--soft)}
.novo-insumo{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}
.foto-drop{border:1.5px dashed var(--line);border-radius:14px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--soft);cursor:pointer;text-align:center;overflow:hidden;font-size:13px}
.foto-drop img{width:100%;height:240px;object-fit:cover}
.mc-line{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);margin-top:12px;padding-top:11px;font-size:13px}
.mc-line .mc-v{font-weight:700}
.fx-g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.ficha-split{flex-direction:column}.fx-left,.fx-right{width:100%}.fx-left{border-right:0;border-bottom:1px solid var(--line)}.fx-g2{grid-template-columns:1fr}}

/* ===== Impressão da ficha técnica ===== */

/* cabeçalho de tabela clicável (ordenação) */
.th-sort{cursor:pointer;user-select:none;white-space:nowrap}
.cat-chip{display:inline-flex;align-items:center;gap:5px;background:#EEF0F4;border-radius:8px;padding:4px 6px 4px 10px;font-size:12.5px;color:var(--ink)}
body.dark .cat-chip{background:#222F4E}
.cat-chip button{display:inline-flex;width:16px;height:16px;border-radius:5px;align-items:center;justify-content:center;color:var(--soft)}
.cat-chip button:hover{background:var(--red-bg);color:var(--red)}
.cat-chip svg{width:11px;height:11px}
.lanc-filtro th{padding:4px 6px!important;border-bottom:1px solid var(--line)}
.lanc-filtro .input{height:30px;padding:4px 8px;font-size:12px;width:100%;min-width:80px}
.th-sort:hover{color:var(--gold)}

/* cards de fichas técnicas */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
.fcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px;transition:.15s}
.fcard:hover{border-color:var(--gold-soft);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.fcard-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.fcard-ic{width:38px;height:38px;border-radius:10px;background:var(--amber-bg);color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fcard-ic svg{width:20px;height:20px}
.fcard-nm{font-weight:700;font-size:15px;line-height:1.15}
.fcard-sub{font-size:11.5px;color:var(--soft);margin-top:3px}
.fcard-badge{margin-left:auto;font-size:12px;font-weight:700;padding:3px 9px;border-radius:8px;flex-shrink:0}
.fcard-acts{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted);padding:9px 0;border-bottom:1px solid var(--line);margin-bottom:9px;flex-wrap:wrap}
.fcard-acts button,.fcard-acts a{color:var(--muted);background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:0}
.fcard-acts svg{width:13px;height:13px}
.fcard-acts button:hover,.fcard-acts a:hover{color:var(--gold)}
.fcard-acts .edit{margin-left:auto;color:var(--navy);font-weight:600}
body.dark .fcard-acts .edit{color:#9DB4E8}
.frow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.frow .l{color:var(--muted)}
.frow.div{border-top:1px solid var(--line);margin-top:6px;padding-top:9px}

/* ficha modular */
.mod-cost{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0}
.mod-cost>div{border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.mod-cost .l{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700}
.mod-cost .v{font-size:18px;font-weight:700;font-family:'Fraunces',serif;margin-top:3px}
.mod-box{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.mod-box-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mod-opt-h{display:grid;grid-template-columns:26px 1fr 130px 34px 28px;gap:8px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:0 2px 4px}
.mod-opt{display:grid;grid-template-columns:26px 1fr 130px 34px 28px;gap:8px;align-items:center;margin-bottom:7px}
.mod-opt .lk{border:1px solid var(--line);border-radius:8px;background:var(--card);cursor:pointer;color:var(--muted);height:38px;display:flex;align-items:center;justify-content:center}
.mod-opt .lk svg{width:15px;height:15px}
.mod-opt .lk.on{background:var(--amber-bg);color:var(--gold);border-color:var(--gold-soft)}
.mod-add{width:100%;border:1px dashed var(--line);border-radius:10px;background:none;color:var(--muted);padding:9px;cursor:pointer;font-size:13px;font-weight:600}
.mod-add:hover{border-color:var(--gold-soft);color:var(--gold)}

/* gerenciar categorias */
.cat-scroll{max-height:320px;overflow:auto;display:flex;flex-direction:column;gap:7px}
.cat-row{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px}
.cat-row.cat-pad{background:var(--amber-bg);border-color:var(--gold-soft)}
.cat-row.cat-pad>span{color:var(--gold);font-weight:600}
.cat-badge{font-size:9.5px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-left:6px}

/* tabelas e modais: toques finos */
thead th{letter-spacing:.7px}
.modal{border-top:4px solid var(--gold)}
.calc-box{background:linear-gradient(135deg,#24417F,#16294F)}
.cloud-banner{background:linear-gradient(90deg,#A48A57,#8d743f)}
</style>
</head>

/* ============================================================
   LIDERA GESTÃO v2 — gestão financeira p/ restaurante
   Precificação consciente por canal · Programa Lucro e Liberdade
   ============================================================ */
const STORE_KEY='lidera_gestao_v12';
const fmtBRL=v=>(isFinite(v)?v:0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtN=(v,d=0)=>(isFinite(v)?v:0).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct=v=>fmtN(isFinite(v)?v:0,1)+'%';
/* máscara de moeda nos inputs: R$ na frente + milhar/decimal */
const fmtMoneyInput=n=>(isFinite(n)?n:0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function moneyMask(el){let d=(el.value||'').replace(/\D/g,'');if(d==='')d='0';const v=parseInt(d,10)/100;el.value=fmtMoneyInput(v);return v;}
function moneyVal(id){const el=document.getElementById(id);if(!el)return 0;return parseFloat((el.value||'0').replace(/\./g,'').replace(',','.'))||0;}
const uid=()=>Math.random().toString(36).slice(2,9);
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const UNIDADES=['g','ml','un','kg','L'];                       // 5 unidades oficiais
const BASE={kg:'g',g:'g',L:'ml',ml:'ml',un:'un'};
const TO_BASE={kg:1000,g:1,L:1000,ml:1,un:1};
const USYM={g:'gr',ml:'ml',un:'un',kg:'kg',L:'lt'};           // símbolo da unidade de compra
const BSYM={g:'gr',ml:'ml',un:'un'};                          // símbolo da unidade-base
const ULABEL={g:'Gramas (gr)',ml:'Mililitros (ml)',un:'Unidade (un)',kg:'Quilogramas (kg)',L:'Litros (lt)'};
function uSym(u){return USYM[u]||u;}
function bSym(u){return BSYM[BASE[u]]||BASE[u]||'';}
const DEF_CAT_INSUMO=['Proteínas','Laticínios','Grãos','Legumes','Hortifruti','Molhos','Temperos','Óleos','Vinhos','Bebidas','Padaria','Congelados','Mercearia','Embalagens'];
const DEF_CAT_PRATO=['Prato Principal','Entrada','Acompanhamento','Sobremesa','Drinks, Coquetéis e Sucos','Lanches'];
const CAT_INSUMO=DEF_CAT_INSUMO, CAT_FICHA=DEF_CAT_PRATO;     // aliases (compat.)
function dbCats(){DB.cats=DB.cats||{insumo:[],prato:[]};DB.cats.insumo=DB.cats.insumo||[];DB.cats.prato=DB.cats.prato||[];return DB.cats;}
function catList(t){const def=t==='prato'?DEF_CAT_PRATO:DEF_CAT_INSUMO;const cst=dbCats()[t]||[];return [...def,...cst.filter(c=>!def.includes(c))];}
function isCatPadrao(t,c){return (t==='prato'?DEF_CAT_PRATO:DEF_CAT_INSUMO).includes(c);}
function catOptions(t,sel){const list=catList(t).slice();if(sel&&!list.includes(sel))list.unshift(sel);return `<option value="">— categoria —</option>`+list.map(c=>`<option ${c===sel?'selected':''}>${esc(c)}</option>`).join('');}
function fornOptions(sel){const fs=(DB.fin&&DB.fin.fornecedores)||[];const names=fs.map(f=>f.nome).filter(Boolean);if(sel&&!names.includes(sel))names.unshift(sel);return `<option value="">— sem fornecedor —</option>`+names.map(nm=>`<option ${nm===sel?'selected':''}>${esc(nm)}</option>`).join('');}

let DB=load();
function load(){try{const d=JSON.parse(localStorage.getItem(STORE_KEY));if(d&&d.insumos)return d;}catch(e){}return seed();}
function save(){if(typeof CLOUD!=='undefined'&&CLOUD){pushCloud();renderFoot();return;}try{localStorage.setItem(STORE_KEY,JSON.stringify(DB));}catch(e){if(window.toast)toast('Não foi possível salvar (armazenamento cheio ou bloqueado)');}renderFoot();}
async function saveNow(){clearTimeout(window._cloudT);renderFoot();
  try{localStorage.setItem(STORE_KEY,JSON.stringify(DB));}catch(e){}
  if(typeof CLOUD!=='undefined'&&CLOUD&&typeof sb!=='undefined'&&sb&&typeof ORG!=='undefined'&&ORG){
    try{const {error}=await sb.from('organizacoes').update({dados:DB}).eq('id',ORG.id);return !error;}catch(e){return false;}}
  return true;}
function seed(){
  const i={};
  const mk=(nome,cat,uni,valorPago,qtd)=>{const id=uid();i[id]={id,nome,cat,tipo:'pronto',uni,preco:valorPago,qtd};return id;};
  const mkp=(nome,cat,uni,rendimento,comps)=>{const id=uid();i[id]={id,nome,cat,tipo:'preparado',uni,rendimento,comps};return id;};
  const carne=mk('Carne bovina (acém)','Proteínas','kg',38.90,1);
  const frango=mk('Filé de frango','Proteínas','kg',19.50,1);
  const queijo=mk('Queijo mussarela','Laticínios','kg',42.00,1);
  const pao=mk('Pão de hambúrguer','Padaria','un',1.20,1);
  const batata=mk('Batata congelada','Congelados','kg',12.90,1);
  const alface=mk('Alface','Hortifruti','kg',12.00,1);
  const tomate=mk('Tomate','Hortifruti','kg',8.90,1);
  const massa=mk('Massa fresca','Padaria','kg',16.00,1);
  const molhoT=mk('Molho de tomate (lata)','Mercearia','kg',9.50,1);
  const oleo=mk('Óleo','Óleos','L',7.90,1);
  const maionese=mk('Maionese','Mercearia','kg',14.00,1);
  const mostarda=mk('Mostarda','Mercearia','kg',12.00,1);
  const ketchup=mk('Ketchup','Mercearia','kg',11.00,1);
  // INSUMO PREPARADO (produzido na casa) — rende 1000g
  const molhoEsp=mkp('Molho especial da casa','Molhos','g',1000,[[maionese,600],[ketchup,250],[mostarda,150]]);
  // estoque (mín/atual na unidade de compra) e fornecedor — exemplo
  const est=(id,forn,min,atual)=>{const o=i[id];o.fornecedor=forn;o.estoqueMin=min;o.estoqueAtual=atual;};
  est(carne,'Lojão das Carnes',8,3); est(frango,'Lojão das Carnes',6,6); est(queijo,'Karne e Keijo',4,1);
  est(pao,'Padaria Central',120,40); est(batata,'Karne e Keijo',10,4); est(alface,'Hortifruti do Zé',5,2);
  est(tomate,'Hortifruti do Zé',6,5); est(massa,'Distribuidora Central',8,3); est(molhoT,'Distribuidora Central',6,2);
  est(oleo,'Distribuidora Central',5,2); est(maionese,'Distribuidora Central',4,3); est(mostarda,'Distribuidora Central',2,2); est(ketchup,'Distribuidora Central',3,1);

  const f={};
  const mkf=(nome,cat,o)=>{const id=uid();f[id]=Object.assign({id,nome,cat,porcoes:1,custoEmbalagem:0,precoVenda:0,precoIfood:0,vendasMes:0,tempoPreparo:0,utensilios:'',modoPreparo:[],padraoFinalizacao:'',foto:'',comps:[]},o);return id;};
  mkf('Burger Clássico','Lanches',{custoEmbalagem:0.85,precoVenda:32,precoIfood:38,vendasMes:1100,tempoPreparo:8,utensilios:'Chapa, espátula, pinça',modoPreparo:['Temperar e moldar o blend de 180g.','Selar na chapa ~2 min por lado.','Montar: pão, blend, queijo, molho e alface.'],padraoFinalizacao:'Servir em até 3 min com o pão levemente tostado.',comps:[[carne,180],[pao,1],[queijo,40],[alface,20],[molhoEsp,18]]});
  mkf('Burger Frango Crispy','Lanches',{custoEmbalagem:0.85,precoVenda:29,precoIfood:35,vendasMes:680,tempoPreparo:9,comps:[[frango,160],[pao,1],[queijo,30],[alface,20],[oleo,30],[molhoEsp,15]]});
  mkf('Porção Batata Frita','Acompanhamentos',{custoEmbalagem:0.85,precoVenda:24,precoIfood:28,vendasMes:960,tempoPreparo:6,comps:[[batata,300],[oleo,40]]});
  mkf('Massa ao Sugo','Pratos',{custoEmbalagem:1.20,precoVenda:38,precoIfood:44,vendasMes:290,tempoPreparo:14,comps:[[massa,200],[molhoT,150],[queijo,40],[tomate,60]]});
  mkf('Salada Caesar','Entradas',{custoEmbalagem:1.20,precoVenda:26,precoIfood:30,vendasMes:160,tempoPreparo:10,comps:[[frango,120],[alface,80],[tomate,50],[molhoEsp,20]]});

  return {
    insumos:i, fichas:f,
    fin:{regime:'simples', aliquota:6, impostoFixo:75, comissaoIfood:27, taxaCartao:2.5,
      custosFixos:[
        {id:uid(),nome:'Aluguel',valor:6500,grupo:'Infraestrutura'},
        {id:uid(),nome:'Energia + Água + Gás',valor:2600,grupo:'Infraestrutura'},
        {id:uid(),nome:'Internet',valor:120,grupo:'Infraestrutura'},
        {id:uid(),nome:'Marketing',valor:1500,grupo:'Admin e Mkt'}],
      provisoes:[{id:uid(),nome:'Reserva trabalhista (CLT)',valor:1400},{id:uid(),nome:'Depreciação equipamentos',valor:300}],
      funcionarios:[{id:uid(),nome:'Cozinheiro 1',cargo:'Cozinha',salario:2500},{id:uid(),nome:'Cozinheiro 2',cargo:'Cozinha',salario:4000}],
      socios:[{id:uid(),nome:'Sócio 1',proLabore:10000},{id:uid(),nome:'Sócio 2',proLabore:10000}],
      meiosPagamento:[{id:uid(),nome:'Banricompras Crédito',tipo:'Crédito',taxa:2.99},{id:uid(),nome:'Banricompras Débito',tipo:'Débito',taxa:1.99},{id:uid(),nome:'iFood',tipo:'Marketplace',taxa:27}],
      fornecedores:[{id:uid(),nome:'Distribuidora Central',contato:'(51) 99999-0000'},{id:uid(),nome:'Hortifruti do Zé',contato:'(51) 98888-0000'}],
      contasBancarias:[{id:uid(),nome:'Conta Corrente',saldo:12500}],
      contasPagar:[
        {id:uid(),descricao:'Aluguel — junho',valor:6500,categoria:'Infraestrutura',vencimento:'2026-06-15',pago:false},
        {id:uid(),descricao:'Fornecedor — Distribuidora Central',valor:8200,categoria:'Insumos',vencimento:'2026-06-12',pago:false},
        {id:uid(),descricao:'Energia + Água + Gás',valor:2600,categoria:'Infraestrutura',vencimento:'2026-06-20',pago:false},
        {id:uid(),descricao:'Internet',valor:120,categoria:'Infraestrutura',vencimento:'2026-06-22',pago:false}],
      contasReceber:[
        {id:uid(),descricao:'Repasse iFood — semana',valor:15770,categoria:'Vendas',vencimento:'2026-06-18',recebido:false},
        {id:uid(),descricao:'Evento corporativo',valor:3200,categoria:'Vendas',vencimento:'2026-06-25',recebido:false}]},
    fat:{lancado:0, mixIfood:35},
    cmvAlvo:30,
    equipe:[{id:uid(),nome:'Gerente Geral',email:'gerente@restaurante.com',senha:''}],
    conta:{restaurante:'Restaurante Lidera',nome:'',email:'contato@somoslidera.com.br',telefone:'',cpf:'',nascimento:''},
    buffet:{precoVendaKg:'89.90', cubas:[
      {id:uid(),fichaId:Object.keys(f)[2],pesoKg:'4',x:28,y:36,w:104,h:74,rot:0},
      {id:uid(),fichaId:Object.keys(f)[3],pesoKg:'3',x:152,y:36,w:104,h:74,rot:0},
      {id:uid(),fichaId:Object.keys(f)[4],pesoKg:'2.5',x:276,y:36,w:104,h:74,rot:0}]},
    cmvRegistros:[
      {id:uid(),data:'2026-05-08',ei:10000,compras:10000,ef:2000,vendas:60000},
      {id:uid(),data:'2026-05-22',ei:2000,compras:11500,ef:2800,vendas:64000},
      {id:uid(),data:'2026-06-05',ei:2800,compras:12200,ef:3100,vendas:66000}]
  };
}

/* ===================== MOTOR DE CÁLCULO ===================== */
function custoInsumoBase(ins,_seen){ // custo por 1 unidade-base (g/ml/un) do insumo
  if(!ins) return 0;
  if(ins.tipo==='preparado'){ // sub-receita: soma dos ingredientes ÷ rendimento
    _seen=_seen||new Set(); if(_seen.has(ins.id)) return 0; _seen.add(ins.id); // anti-ciclo
    let total=0;(ins.comps||[]).forEach(([cid,q])=>{const c=DB.insumos[cid];if(c)total+=custoInsumoBase(c,_seen)*(q||0);});
    const baseQty=(ins.rendimento||1)*(TO_BASE[ins.uni]||1);
    return baseQty? total/baseQty : 0;
  }
  const totalBase=(ins.qtd||1)*(TO_BASE[ins.uni]||1);
  return totalBase? ins.preco/totalBase : 0;
}
function custoFicha(ficha){ // soma dos insumos da ficha (sem embalagem)
  return (ficha.comps||[]).reduce((s,c)=>{const ins=DB.insumos[c[0]];return s+(ins?custoInsumoBase(ins)*(c[1]||0):0);},0);
}
function custoProduto(ficha){ // custo por porção vendida = insumos/porção + embalagem
  return custoFicha(ficha)/(ficha.porcoes||1)+(ficha.custoEmbalagem||0);
}
function pesoFichaKg(ficha){ // peso total da receita em Kg (insumos de massa/volume)
  let g=0;(ficha.comps||[]).forEach(([id,q])=>{const ins=DB.insumos[id];if(!ins)return;const b=BASE[ins.uni];if(b==='g'||b==='ml')g+=(q||0);});
  return g/1000;
}
function custoPorKgFicha(ficha){ // custo de 1 Kg do prato pronto
  const kg=pesoFichaKg(ficha), ct=custoFicha(ficha);
  return kg>0? ct/kg : custoProduto(ficha);
}
function impostoVarPct(){return DB.fin.mei?0:(DB.fin.aliquota||0);}
function impostoMensal(fat){return DB.fin.mei?(DB.fin.impostoFixo||0):fat*((DB.fin.aliquota||0)/100);}
function regimeLabel(){if(DB.fin.mei)return 'MEI / DAS';return DB.fin.regime==='presumido'?'Lucro Presumido':DB.fin.regime==='lucroReal'?'Lucro Real':'Simples Nacional';}
function metricasCanal(ficha,canal){ // canal: 'balcao' | 'ifood'
  const custo=custoProduto(ficha);
  const preco = canal==='ifood' ? (ficha.precoIfood||ficha.precoVenda||0) : (ficha.precoVenda||0);
  const comissao = canal==='ifood' ? (DB.fin.comissaoIfood||0) : 0;
  const descPct=(comissao+impostoVarPct())/100;
  const mc = preco - custo - preco*descPct;       // margem de contribuição R$
  const mcPct = preco? mc/preco*100 : 0;
  const cmv = preco? custo/preco*100 : 0;
  return {preco,custo,comissaoPct:comissao,impostoPct:impostoVarPct(),mc,mcPct,cmv,markup:custo?preco/custo:0};
}
function metricasFicha(ficha){ // mistura por canal usando mix iFood global
  const b=metricasCanal(ficha,'balcao'), i=metricasCanal(ficha,'ifood');
  const mix=(DB.fat.mixIfood||0)/100;
  const precoBlend=b.preco*(1-mix)+i.preco*mix;
  const mcBlend=b.mc*(1-mix)+i.mc*mix;
  const cmvBlend=precoBlend?(b.custo/precoBlend*100):0;
  const vendas=ficha.vendasMes||0;
  return {balcao:b,ifood:i,custo:b.custo,precoBlend,mcBlend,cmvBlend,
    mcPctBlend:precoBlend?mcBlend/precoBlend*100:0,vendas,
    receita:precoBlend*vendas, mcTotal:mcBlend*vendas,
    health: healthFicha(b.cmv)};
}
// Classificação do CMV — limiar "excelente" = CMV alvo dos Parâmetros (padrão 30%); crítico acima de 35%
function cmvAlvoRef(){return DB.cmvAlvo||30;}
function cmvUpRef(){return cmvAlvoRef()+5;}
function cmvClasse(v){const a=cmvAlvoRef();return v<=a?'excelente':(v<=cmvUpRef()?'atencao':'critico');}
function cmvCorRef(v){const c=cmvClasse(v);return c==='excelente'?'var(--green)':c==='atencao'?'var(--amber)':'var(--red)';}
function healthFicha(cmv){const c=cmvClasse(cmv);return c==='excelente'?'saudavel':c;}
function fichasVendaveis(){return Object.values(DB.fichas);}
function custoFuncionario(f){const base=(f.salario||0)+(f.premio||0);
  const benef=(f.vt||0)+((f.custoRefeicaoDia||0)*(f.diasTrabalhados||0)*(f.qtdVales||0));
  const isCLT=(f.regime||'CLT')==='CLT';
  const fgts=isCLT?base*((DB.fin.encFGTS||0)/100):0;
  const inss=isCLT?base*((DB.fin.encINSS||0)/100):0;
  const prov=isCLT?base*((DB.fin.encProv||0)/100):0;
  return {base,benef,fgts,inss,prov,encargos:fgts+inss+prov,total:base+benef+fgts+inss+prov};}
function folhaTotal(){return (DB.fin.funcionarios||[]).reduce((s,f)=>s+custoFuncionario(f).total,0);}
function custoSocio(s){const real=s.proLabore||0;const decl=(s.proLaboreDeclarado!=null&&s.proLaboreDeclarado!=='')?s.proLaboreDeclarado:real;return real+decl*((DB.fin.inssSocio||11)/100);}
function proLaboreTotal(){return (DB.fin.socios||[]).reduce((s,x)=>s+custoSocio(x),0);}
function custosEstruturais(){const f=DB.fin;let t=0;
  const im=f.imovel||{};t+=(im.aluguel||0)+((im.iptuAnual||0)/12);
  const u=f.utilidades||{};t+=(u.energia||0)+(u.agua||0)+(u.internet||0)+(u.telefone||0)+(u.alarme||0)+(u.seguranca||0);
  const sr=f.servicosRec||{};t+=(sr.dedetizacao||0)+(sr.lixo||0)+(sr.limpeza||0);
  const op=f.operacionais||{};t+=(op.gas||0)+(op.oleo||0)+(op.descartaveis||0);
  (f.servicosMensais||[]).forEach(s=>t+=(s.valor||0));
  (f.equipamentos||[]).forEach(e=>{const anos=(e.vidaUtilAnos||5)||5;t+=(e.valorPago||0)/(anos*12);});
  const si=f.sistemas||{};t+=(si.software||0)+(si.contabil||0)+(si.aluguelMaquininha||0);
  (f.veiculos||[]).forEach(v=>t+=(v.parcela||0)+((v.ipvaAnual||0)/12)+((v.seguroAnual||0)/12)+(v.combustivel||0));
  const mk=f.marketing||{};t+=(mk.agencia||0)+((mk.canais||[]).reduce((s,c)=>s+(c.valor||0),0))+((mk.brindeUnit||0)*(mk.brindeQtd||0));
  return t;}
function custosFixosTotais(){

  add('ana_mkt_brinde','Brindes','Publicidade','Publicidade e Propaganda',(mk.brindeUnit||0)*(mk.brindeQtd||0));

function syncAnamneseCustosFixos(){
  DB.fin.custosFixos=DB.fin.custosFixos||[];
  const itens=anamneseFixosItens(),srcs=new Set(itens.map(x=>x.src));
  // remove linhas automáticas cuja origem sumiu (valor zerado / item removido na anamnese)
  DB.fin.custosFixos=DB.fin.custosFixos.filter(r=>!(r.auto&&!srcs.has(r.src)));
  itens.forEach(it=>{
    const r=DB.fin.custosFixos.find(x=>x.auto&&x.src===it.src);
    if(r){r.nome=it.nome;r.grupo=it.grupo;r.sub=it.sub;r.valor=it.valor;} // preserva diaVenc definido na aba
    else DB.fin.custosFixos.push({id:uid(),auto:true,src:it.src,nome:it.nome,grupo:it.grupo,sub:it.sub,valor:it.valor,diaVenc:0});
  });
}

let periodo='mesAtual', periodoCustom={de:'',ate:''};
function periodoRange(p){p=p||periodo;const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const iso=(yy,mm,dd)=>yy+'-'+String(mm+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
  const ld=(yy,mm)=>new Date(yy,mm+1,0).getDate();
  if(p==='mesAnterior'){const pm=m===0?11:m-1,py=m===0?y-1:y;return{de:iso(py,pm,1),ate:iso(py,pm,ld(py,pm)),label:'Mês anterior',nm:1};}
  if(p==='ult3'){let sm=m-2,sy=y;if(sm<0){sm+=12;sy--;}return{de:iso(sy,sm,1),ate:iso(y,m,ld(y,m)),label:'Últimos 3 meses',nm:3};}
  if(p==='ano')return{de:iso(y,0,1),ate:iso(y,m,ld(y,m)),label:'Este ano ('+y+')',nm:m+1};
  if(p==='anoAnterior')return{de:iso(y-1,0,1),ate:iso(y-1,11,31),label:'Ano anterior ('+(y-1)+')',nm:12};
  if(p==='custom'){const de=periodoCustom.de||iso(y,m,1),ate=periodoCustom.ate||iso(y,m,ld(y,m));const a=de.slice(0,7).split('-'),b=ate.slice(0,7).split('-');let nm=(+b[0]-+a[0])*12+(+b[1]-+a[1])+1;if(!(nm>=1))nm=1;return{de,ate,label:fmtDataBR(de)+' a '+fmtDataBR(ate),nm};}
  return{de:iso(y,m,1),ate:iso(y,m,ld(y,m)),label:'Mês atual',nm:1};}
function setPeriodo(v){periodo=v;if(v==='custom'&&!periodoCustom.de){const r=periodoRange('mesAtual');periodoCustom={de:r.de,ate:r.ate};}ROUTES[current].render();}
function setPeriodoCustom(k,v){periodoCustom[k]=v;periodo='custom';if(periodoCustom.de&&periodoCustom.ate)ROUTES[current].render();}
function periodoSeletor(){const opts=[['mesAtual','Mês atual'],['mesAnterior','Mês anterior'],['ult3','Últimos 3 meses'],['ano','Este ano'],['anoAnterior','Ano anterior'],['custom','Selecionar período…']];
  return `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <select class="input" style="max-width:185px;height:38px" onchange="setPeriodo(this.value)">${opts.map(([v,l])=>`<option value="${v}" ${periodo===v?'selected':''}>${l}</option>`).join('')}</select>
    ${periodo==='custom'?`<input type="date" class="input" style="max-width:150px;height:38px" value="${periodoCustom.de||''}" onchange="setPeriodoCustom('de',this.value)"><span style="color:var(--soft);font-size:12px">até</span><input type="date" class="input" style="max-width:150px;height:38px" value="${periodoCustom.ate||''}" onchange="setPeriodoCustom('ate',this.value)">`:''}
  </div>`;}
function totaisGerais(R){
  R=R||{de:periodoRange('mesAtual').de,ate:periodoRange('mesAtual').ate,nm:1};
  const nm=R.nm||1;
  // vendasMes das fichas alimenta SÓ a Engenharia de Menu e a proporção (CMV teórico).
  let receitaEst=0,custoTot=0,vendas=0;
  fichasVendaveis().forEach(f=>{const m=metricasFicha(f);
    receitaEst+=m.receita; custoTot+=m.custo*m.vendas; vendas+=m.vendas;});
  const mix=(DB.fat.mixIfood||0)/100;
  // faturamento real: soma das Receitas lançadas no período; fallback p/ valor manual × nº de meses
  const recReal=(DB.lancamentos||[]).filter(l=>l.data>=R.de&&l.data<=R.ate&&grupoTipo(l.grupo)==='receita').reduce((s,l)=>s+(l.valor||0),0);
  const faturamento=recReal; // faturamento vem 100% das Receitas lançadas no período
  const cmvPct=receitaEst>0?(custoTot/receitaEst):0;            // CMV teórico (proporção do cardápio)
  const recIfood=faturamento*mix, recDireto=faturamento*(1-mix), cmvRS=faturamento*cmvPct;
  const comissaoRS=recIfood*((DB.fin.comissaoIfood||0)/100);
  const impostoRS=DB.fin.mei?impostoMensal(faturamento)*nm:impostoMensal(faturamento);
  const taxaCartaoRS=recDireto*((DB.fin.taxaCartao||0)/100);
  const custosVar=cmvRS+comissaoRS+impostoRS+taxaCartaoRS;
  const fixosBase=((DB.fin.custosFixos||[]).reduce((s,d)=>s+(d.valor||0),0))*nm; // estruturais já espelhados em custosFixos
  const provisoesRS=(DB.fin.provisoes||[]).reduce((s,d)=>s+(d.valor||0),0)*nm;
  const folha=folhaTotal()*nm, prol=proLaboreTotal()*nm;
  const fixos=fixosBase+folha+prol+provisoesRS;
  const mcRS=faturamento-custosVar;
  const mcPctMed=faturamento?mcRS/faturamento*100:0;
  const cmv=cmvPct*100;                                        // CMV teórico do cardápio (independe do faturamento)
  const ticket=vendas?faturamento/vendas:0;
  const lucro=mcRS-fixos;
  const dinheiroMesa=comissaoRS+taxaCartaoRS;
  const faturamentoEq=mcPctMed>0?fixos/(mcPctMed/100):Infinity;
  const diaEq=faturamento>0&&isFinite(faturamentoEq)?faturamentoEq/faturamento*30:Infinity;
  return {receita:receitaEst,faturamento,custoTot:cmvRS,cmv,vendas,ticket,
    recIfood,recDireto,comissaoRS,impostoRS,taxaCartaoRS,custosVar,custosVarPct:faturamento?custosVar/faturamento*100:0,
    fixosBase,provisoesRS,folha,prol,fixos,fixosPct:faturamento?fixos/faturamento*100:0,
    mcRS,mcPctMed,mcTot:mcRS,lucro,margemLiq:faturamento?lucro/faturamento*100:0,
    dinheiroMesa,dinheiroMesaPct:faturamento?dinheiroMesa/faturamento*100:0,faturamentoEq,diaEq};
}

function normData(){
  DB.fin=DB.fin||{};const f=DB.fin;
  if(f.regime==='mei'){f.mei=true;f.regime='simples';}            // migra regime antigo
  if(f.mei==null)f.mei=false;
  if(f.regime==null||!['simples','presumido','lucroReal'].includes(f.regime))f.regime='simples';
  if(f.aliquota==null)f.aliquota=6; if(f.impostoFixo==null)f.impostoFixo=75;
  if(f.inssSocio==null)f.inssSocio=11;
  if(f.comissaoIfood==null)f.comissaoIfood=27; if(f.taxaCartao==null)f.taxaCartao=2.5;
  // encargos CLT detalhados (FGTS + INSS + provisões 13º/férias) — migra do encargoCLT antigo
  if(f.encFGTS==null||f.encINSS==null||f.encProv==null){const old=(f.encargoCLT!=null?f.encargoCLT:32);f.encFGTS=8;f.encINSS=0;f.encProv=Math.max(0,old-8);}
  f.imovel=f.imovel||{}; f.utilidades=f.utilidades||{}; f.servicosRec=f.servicosRec||{}; f.operacionais=f.operacionais||{}; f.sistemas=f.sistemas||{}; f.marketing=f.marketing||{};
  f.marketing.canais=f.marketing.canais||[]; // múltiplos canais de tráfego/mídia
  if(f.marketing.trafego>0&&!f.marketing.canais.length){f.marketing.canais.push({nome:f.marketing.plataforma||'Tráfego pago',valor:f.marketing.trafego});f.marketing.trafego=0;}
  f.servicosMensais=f.servicosMensais||[]; f.equipamentos=f.equipamentos||[]; f.veiculos=f.veiculos||[]; f.marketplaces=f.marketplaces||[]; f.operadorasCartao=f.operadorasCartao||[]; f.historicoFat=f.historicoFat||[];
  f.funcionarios=f.funcionarios||[]; f.socios=f.socios||[];
  (f.funcionarios||[]).forEach(x=>{if(x.regime==null)x.regime='CLT';});
  (f.socios||[]).forEach(s=>{if(s.proLaboreDeclarado==null)s.proLaboreDeclarado=s.proLabore||0;});
  DB.conta=DB.conta||{};
  DB.modulares=DB.modulares||{};
  // Lançamentos financeiros + categorias (DRE / Fluxo de Caixa)
  if(!DB.categorias||!Object.keys(DB.categorias).length){DB.categorias={};DRE_DEFAULT.forEach(([g,tipo,subs])=>{DB.categorias[g]={tipo,subs:subs.slice()};});}
  DB.lancamentos=DB.lancamentos||[];
  DB.desperdicios=DB.desperdicios||[];
  DB.despMotivos=(DB.despMotivos&&DB.despMotivos.length)?DB.despMotivos:DESP_MOTIVOS.slice();
  DB.formasPagamento=(DB.formasPagamento&&DB.formasPagamento.length)?DB.formasPagamento:FORMAS_DEFAULT.slice();
  // migra contas a pagar/receber p/ grupo+subcategoria (lançamento automático ao pagar/receber)
  (f.contasPagar||[]).forEach(c=>{if(c.grupo==null){c.grupo='Despesas Gerais';c.sub=c.categoria||((DB.categorias['Despesas Gerais']||{subs:[]}).subs[0]||'');}});
  (f.contasReceber||[]).forEach(c=>{if(c.grupo==null){c.grupo='Receita';c.sub=c.categoria||'Outras Receitas';}});
  // custos fixos recorrentes: grupo/sub do DRE + dia de vencimento (geram contas a pagar todo mês)
  f.recGerados=f.recGerados||{};
  (f.custosFixos||[]).forEach(c=>{if(!DB.categorias[c.grupo]){c.grupo='Despesas Gerais';c.sub=c.sub||((DB.categorias['Despesas Gerais']||{subs:[]}).subs[0]||'');}if(c.diaVenc==null)c.diaVenc=0;});
  if(!f._fixosMigrados){syncAnamneseCustosFixos();f._fixosMigrados=true;} // espelha custos da anamnese p/ aba Custos Fixos (1x)
  (f.funcionarios||[]).forEach(x=>{if(x.diaVenc==null)x.diaVenc=0;});
  (f.socios||[]).forEach(x=>{if(x.diaVenc==null)x.diaVenc=0;});
  if(DB.onboardingFeito==null)DB.onboardingFeito=(Object.keys(DB.insumos||{}).length>0||Object.keys(DB.fichas||{}).length>0);
}

function gaugeSVG(pct){
  const p=clamp(pct,0,100), circ=Math.PI*70, off=circ*(1-p/100);
  const cor=pct>=100?'var(--green)':pct>=70?'var(--gold)':'var(--amber)';
  return `<svg width="190" height="108" viewBox="0 0 190 108">
    <path d="M22 92 A73 73 0 0 1 168 92" fill="none" stroke="var(--line)" stroke-width="13" stroke-linecap="round"/>
    <path d="M22 92 A73 73 0 0 1 168 92" fill="none" stroke="${cor}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${Math.PI*73}" stroke-dashoffset="${Math.PI*73*(1-p/100)}"/>
  </svg>`;
}
function cmvRealPeriodo(R){const regs=(DB.cmvRegistros||[]).map(cmvRegCalc).filter(r=>r.data&&r.data>=R.de&&r.data<=R.ate);
  if(!regs.length)return null;const cmvRS=regs.reduce((s,r)=>s+(r.cmvRS||0),0),ve=regs.reduce((s,r)=>s+(r.ve||0),0);return ve>0?cmvRS/ve*100:null;}
function cmvLancPeriodo(R){const ls=(DB.lancamentos||[]).filter(l=>l.data>=R.de&&l.data<=R.ate);
  const cmv=ls.filter(l=>l.grupo==='CMV').reduce((s,l)=>s+(l.valor||0),0);
  const rec=ls.filter(l=>grupoTipo(l.grupo)==='receita').reduce((s,l)=>s+(l.valor||0),0);
  return cmv>0?{pct:rec>0?cmv/rec*100:null,cmvRS:cmv,rec}:null;}

const SORTCOLS={
 insumos:{nome:i=>i.nome,cat:i=>i.cat,fornecedor:i=>i.fornecedor||'',preco:i=>i.preco||0,qtd:i=>i.qtd||0,custo:i=>custoInsumoBase(i)*(TO_BASE[i.uni]||1),noEstoque:i=>i.noEstoque!==false?1:0},

function setSort(tab,k){const s=SORT[tab];if(s.k===k)s.d=-s.d;else{s.k=k;s.d=1;}tab==='insumos'?viewInsumos():viewEstoque();}
function applySort(tab,arr){const s=SORT[tab],acc=SORTCOLS[tab][s.k];if(!acc)return arr;return arr.slice().sort((a,b)=>{let x=acc(a),y=acc(b);if(typeof x==='string'||typeof y==='string'){x=(x||'').toString().toLowerCase();y=(y||'').toString().toLowerCase();return x<y?-s.d:x>y?s.d:0;}return ((x||0)-(y||0))*s.d;});}

function insumoAOA(modo){
  const header=['Produto/Insumo','Grupo','Fornecedor','Peso/Conteúdo','Unidade','Valor Embalagem'];
  if(modo==='modelo')return [header];   // modelo em branco — só o cabeçalho
  const prontos=Object.values(DB.insumos).filter(i=>i.tipo!=='preparado');
  return [header,...prontos.map(i=>[i.nome,i.cat,i.fornecedor||'',i.qtd,uSym(i.uni),i.preco])];
}
async function exportarInsumos(modo,fmt){const aoa=insumoAOA(modo);const arq=modo==='modelo'?'modelo-insumos':'meus-insumos';
  if(fmt==='csv'){
    const csv=aoa.map(r=>r.map(c=>{let s=(typeof c==='number')?String(c).replace('.',','):String(c);return /[;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(';')).join('\r\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));a.download=arq+'.csv';a.click();
  }else{
    try{const XLSX=await loadXLSX();const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!cols']=[{wch:26},{wch:16},{wch:14},{wch:16},{wch:10},{wch:16}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Insumos');XLSX.writeFile(wb,arq+'.xlsx');}
    catch(e){return toast('Não foi possível gerar o Excel. Tente CSV.');}
  }
  closeModal();toast(modo==='modelo'?'Modelo baixado':'Insumos exportados');
}
function loadXLSX(){return new Promise((res,rej)=>{if(window.XLSX)return res(window.XLSX);const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>res(window.XLSX);s.onerror=()=>rej(new Error('xlsx'));document.head.appendChild(s);});}
function parseCSV(text){text=text.replace(/^﻿/,'');const l0=(text.split('\n')[0]||'');const delim=((l0.match(/;/g)||[]).length>=(l0.match(/,/g)||[]).length)?';':',';
  const rows=[];let cur=[],val='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){val+='"';i++;}else q=false;}else val+=ch;}
    else{if(ch==='"')q=true;else if(ch===delim){cur.push(val);val='';}else if(ch==='\n'){cur.push(val);rows.push(cur);cur=[];val='';}else if(ch==='\r'){}else val+=ch;}}
  if(val.length||cur.length){cur.push(val);rows.push(cur);}return rows;}
function normUni(s){s=(s||'').toString().trim().toLowerCase();const m={g:'g',gr:'g',grama:'g',gramas:'g',kg:'kg',quilo:'kg',quilos:'kg',quilograma:'kg',quilogramas:'kg',ml:'ml',mililitro:'ml',mililitros:'ml',l:'L',lt:'L',litro:'L',litros:'L',un:'un',und:'un',unid:'un',unidade:'un',unidades:'un',pc:'un'};return m[s]||'un';}
function parseNumBR(s){if(typeof s==='number')return s;s=(s||'').toString().replace(/[^\d.,-]/g,'').trim();if(!s)return 0;
  if(s.indexOf(',')>=0&&s.indexOf('.')>=0)s=s.replace(/\./g,'').replace(',','.');else if(s.indexOf(',')>=0)s=s.replace(',','.');
  return parseFloat(s)||0;}
async function importarInsumos(input){const f=input&&input.files&&input.files[0];if(input)input.value='';if(!f)return;
  let rows;
  try{
    if(/\.xlsx?$/i.test(f.name)){const XLSX=await loadXLSX();const data=new Uint8Array(await f.arrayBuffer());const wb=XLSX.read(data,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});}
    else{rows=parseCSV(await f.text());}
  }catch(e){return toast('Não foi possível ler o arquivo. Use o modelo em Baixar.');}
  aplicarImportInsumos(rows);
}
function aplicarImportInsumos(rows){rows=(rows||[]).filter(r=>r&&r.some(c=>(c||'').toString().trim()!==''));
  if(!rows.length)return toast('Planilha vazia');
  const head=rows[0].map(c=>(c||'').toString().toLowerCase());
  const find=(...keys)=>head.findIndex(h=>keys.some(k=>h.indexOf(k)>=0));
  let iNome=find('produto','insumo','nome'),iCat=find('grupo','categ'),iForn=find('fornec'),iUni=find('unidade','unid','und'),iQtd=find('peso','conteúdo','conteudo','quant','qtd','compra'),iVal=find('embalagem','valor','preç','pre');
  let start=1;
  if(iNome<0){iNome=0;iCat=1;iForn=-1;iUni=2;iQtd=3;iVal=4;start=0;}
  DB.fin=DB.fin||{};DB.fin.fornecedores=DB.fin.fornecedores||[];
  let n=0;
  for(let r=start;r<rows.length;r++){const row=rows[r]||[];const nome=(row[iNome]||'').toString().trim();if(!nome)continue;
    const cat=((iCat>=0&&row[iCat])?row[iCat]:'Mercearia').toString().trim()||'Mercearia';
    const forn=(iForn>=0&&row[iForn]?row[iForn]:'').toString().trim();
    const uni=normUni(iUni>=0?row[iUni]:'un');
    const qtd=parseNumBR(iQtd>=0?row[iQtd]:1)||1;
    const preco=parseNumBR(iVal>=0?row[iVal]:0);
    const nid=uid();DB.insumos[nid]={id:nid,nome,cat,tipo:'pronto',uni,qtd,preco,fornecedor:forn};
    if(cat&&!catList('insumo').includes(cat))dbCats().insumo.push(cat);
    if(forn&&!DB.fin.fornecedores.some(f=>(f.nome||'').toLowerCase()===forn.toLowerCase()))DB.fin.fornecedores.push({id:uid(),nome:forn,contato:''});
    n++;}
  if(!n)return toast('Nenhuma linha válida encontrada');
  save();viewInsumos();toast(n+' insumo(s) importado(s)');
}

  if(modulares.length)cats.push('Modular');
  if(preparados.length)cats.push('Preparado');
  if(!cats.includes(fichaFiltro))fichaFiltro='Todas';
  const T=totaisGerais();const fixosPct=T.fixosPct||0;
  let cards='';
  if(fichaFiltro!=='Preparado'&&fichaFiltro!=='Modular'){
    const ff=fichaFiltro==='Todas'?fichas:fichas.filter(f=>f.cat===fichaFiltro);
    cards+=ff.slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(f=>fichaCard(f,fixosPct)).join('');
  }
  if(fichaFiltro==='Todas'||fichaFiltro==='Modular')cards+=modulares.slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(m=>modularFichaCard(m)).join('');
  if(fichaFiltro==='Todas'||fichaFiltro==='Preparado')cards+=preparados.slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(p=>preparadoCard(p)).join('');
  const temAlgo=cards!=='';
  $('#view').innerHTML=`
  <div class="section-head"><div class="pill-filter">${cats.map(c=>`<button class="${c===fichaFiltro?'on':''}" onclick="fichaFiltro='${c}';viewFichas()">${c}</button>`).join('')}</div>
    <input class="input" style="max-width:260px" placeholder="🔎 Buscar ficha por nome..." oninput="filtrarCards(this,'#fgrid')"></div>
  ${temAlgo?`<div class="fgrid" id="fgrid">${cards}</div>`:emptyState('Nenhuma ficha técnica','Monte seus pratos a partir dos insumos.','editFicha()')}`;
}
function fichaCard(f,fixosPct){

  const cmvCls=cmvClasse(cmv);const badge=preco>0?`<span class="fcard-badge ${cmvCls==='excelente'?'tag-green':cmvCls==='atencao'?'tag-amber':'tag-red'}">CMV ${fmtPct(cmv)}</span>`:`<span class="fcard-badge tag-amber">sem preço</span>`;
  return `<div class="fcard" data-nome="${esc(f.nome)}">

      <div style="min-width:0"><div class="fcard-nm">${esc(f.nome)}</div><div class="fcard-sub">${esc(f.cat||'—')}${f.criada?' · criada '+f.criada:''}</div></div>${badge}</div>

      <a class="edit" onclick="editFicha('${f.id}')">Editar ↗</a></div>
    <div class="frow"><span class="l">Insumos</span><b>${fmtBRL(insumos)}</b></div>
    <div class="frow"><span class="l">Embalagem</span><b>${fmtBRL(emb)}</b></div>
    <div class="frow div"><span class="l">Rendimento</span><b>${rend}</b></div>
    <div class="frow"><span class="l">Custo</span><b>${fmtBRL(custo)}</b></div>
    <div class="frow"><span class="l">Valor de Venda</span><b>${preco>0?fmtBRL(preco):'—'}</b></div>

}

function opcaoCusto(o){return (o.fichaId!=null&&o.fichaId!=='')?custoLink(o.fichaId):(o.custo||0);}
function custoLink(id){if(DB.fichas[id])return custoProduto(DB.fichas[id]);const ins=DB.insumos[id];if(ins)return custoInsumoBase(ins)*((ins.rendimento||1)*(TO_BASE[ins.uni]||1));return 0;}
function custoModular(m,modo){let t=0;(m.modulos||[]).forEach(mod=>{const ops=(mod.opcoes||[]);if(!ops.length)return;const vals=ops.map(opcaoCusto);
  if(modo==='padrao'){const def=ops.find(o=>o.padrao)||ops[0];t+=opcaoCusto(def);}
  else if(modo==='min'){t+=mod.obrigatorio?Math.min(...vals):0;}
  else{t+=Math.max(...vals);}});return t;}

        <option value="">— custo manual —</option>${Object.values(DB.fichas).sort((a,b)=>a.nome.localeCompare(b.nome)).map(f=>`<option value="${f.id}">${esc(f.nome)}</option>`).join('')}</select></div>

      <div class="field"><label>Margem de contribuição desejada <span class="hint">%</span></label><input class="input" id="sim_margem" type="number" step="1" value="60" oninput="simRecalc()"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Imposto <span class="hint">%</span></label><input class="input" id="sim_imp" type="number" step="0.1" value="${imp}" oninput="simRecalc()"></div>
      <div class="field"><label>Custo fixo rateado <span class="hint">%</span></label><input class="input" id="sim_fix" type="number" step="0.1" value="${fixosPct}" oninput="simRecalc()"></div>

    <div id="sim_out" style="margin-top:6px"></div>
  </div>
  <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Fechar</button></div>`);
  simRecalc();

function simRecalc(){
  const custo=moneyVal('sim_custo'),margem=parseFloat($('#sim_margem').value)||0,imp=parseFloat($('#sim_imp').value)||0,fix=parseFloat($('#sim_fix').value)||0;
  const denom=1-(margem/100)-(imp/100);const preco=denom>0?custo/denom:0;
  const cmvPct=preco?custo/preco*100:0;const mcRS=preco-custo-preco*imp/100;const mcPct=preco?mcRS/preco*100:0;
  const lucroPct=mcPct-fix,lucroRS=preco*lucroPct/100;
  const el=$('#sim_out');if(!el)return;
  el.innerHTML=`<div class="wiz-calc" style="margin:0">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px">Preço de venda sugerido</div>
    <div style="font-size:28px;font-weight:700;color:var(--navy);font-family:'Fraunces',serif">${preco>0?fmtBRL(preco):'—'}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:13px">
      <span>CMV <b>${fmtPct(cmvPct)}</b></span>
      <span>MC <b style="color:var(--green)">${fmtPct(mcPct)} · ${fmtBRL(mcRS)}</b></span>
      <span>Lucro líq. <b style="color:${lucroPct>=0?'var(--green)':'var(--red)'}">${fmtPct(lucroPct)} · ${fmtBRL(lucroRS)}</b></span>
    </div></div>`;
}

function fichaAOA(){
  const header=['Prato','Categoria','Rendimento (porções)','Custo embalagem','Preço balcão','Preço iFood'];
  const arr=Object.values(DB.fichas);
  const rows=arr.length?arr.map(f=>[f.nome,f.cat,f.porcoes||1,f.custoEmbalagem||0,f.precoVenda||0,f.precoIfood||0])
    :[['Arroz com Frango','Prato Principal',1,1,18,22],['Kibe','Prato Principal',1,0,8,10]];
  return [header,...rows];
}
function baixarModeloFichas(){
  modal(`<div class="modal-head"><h3>Baixar planilha de fichas</h3><button class="x" onclick="closeModal()">${icoX}</button></div>
  <div class="modal-body"><div style="font-size:13.5px;color:var(--muted);margin-bottom:16px">Baixe suas fichas (preços e categorias — sem os ingredientes) para editar e reimportar. Excel (.xlsx) é o recomendado.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" onclick="exportFichas('xlsx')">⬇ Excel (.xlsx)</button><button class="btn btn-ghost" onclick="exportFichas('csv')">⬇ CSV (.csv)</button></div></div>`);
}
async function exportFichas(fmt){const aoa=fichaAOA();
  if(fmt==='csv'){const csv=aoa.map(r=>r.map(c=>{let s=(typeof c==='number')?String(c).replace('.',','):String(c);return /[;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(';')).join('\r\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));a.download='fichas.csv';a.click();}
  else{try{const X=await loadXLSX();const ws=X.utils.aoa_to_sheet(aoa);ws['!cols']=[{wch:26},{wch:18},{wch:18},{wch:16},{wch:14},{wch:14}];const wb=X.utils.book_new();X.utils.book_append_sheet(wb,ws,'Fichas');X.writeFile(wb,'fichas.xlsx');}catch(e){return toast('Não foi possível gerar o Excel. Tente CSV.');}}
  closeModal();toast('Planilha baixada');
}
async function importarFichas(input){const f=input&&input.files&&input.files[0];if(input)input.value='';if(!f)return;
  let rows;try{if(/\.xlsx?$/i.test(f.name)){const X=await loadXLSX();const wb=X.read(new Uint8Array(await f.arrayBuffer()),{type:'array'});rows=X.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});}else rows=parseCSV(await f.text());}catch(e){return toast('Não foi possível ler o arquivo. Use o modelo em Baixar.');}

function classificar(){
  const arr=fichasVendaveis().map(f=>{const m=metricasFicha(f);return{f,m,pop:f.vendasMes||0,marg:m.mcBlend};});
  if(!arr.length)return [];
  const avgPop=arr.reduce((s,x)=>s+x.pop,0)/arr.length;
  const avgMarg=arr.reduce((s,x)=>s+x.marg,0)/arr.length;
  arr.forEach((x,idx)=>{const hiP=x.pop>=avgPop,hiM=x.marg>=avgMarg;
    x.classe=hiP&&hiM?'Estrelas':hiP&&!hiM?'Populares':!hiP&&hiM?'Potenciais':'Críticos';
    x.avgPop=avgPop;x.avgMarg=avgMarg;x.n=idx+1;});
  return arr;
}

function dreCustosDetalhe(){

  (f.funcionarios||[]).forEach(x=>pessoal.push([`${x.nome||'Funcionário'}${x.cargo?' · '+x.cargo:''}`,custoFuncionario(x).total]));
  (f.socios||[]).forEach(x=>pessoal.push([`${x.nome||'Sócio'} · pró-labore`,custoSocio(x)]));
  if(pessoal.length)g.push(['Pessoal e sócios',pessoal]);
  const infra=[];const im=f.imovel||{};
  if(im.aluguel)infra.push(['Aluguel',im.aluguel]); if(im.iptuAnual)infra.push(['IPTU (1/12)',im.iptuAnual/12]);
  const u=f.utilidades||{};[['Energia elétrica',u.energia],['Água / esgoto',u.agua],['Internet',u.internet],['Telefone',u.telefone],['Alarme',u.alarme],['Segurança / ronda',u.seguranca]].forEach(([n,v])=>{if(v)infra.push([n,v]);});
  const sr=f.servicosRec||{};[['Dedetização',sr.dedetizacao],['Lixo especial',sr.lixo],['Material de limpeza',sr.limpeza]].forEach(([n,v])=>{if(v)infra.push([n,v]);});
  const op=f.operacionais||{};[['Gás de cozinha',op.gas],['Óleo / gordura',op.oleo],['Descartáveis',op.descartaveis]].forEach(([n,v])=>{if(v)infra.push([n,v]);});
  (f.servicosMensais||[]).forEach(s=>{if(s.valor)infra.push([s.desc||'Serviço',s.valor]);});
  if(infra.length)g.push(['Infraestrutura',infra]);
  const ativos=[];
  (f.equipamentos||[]).forEach(e=>{const dep=(e.valorPago||0)/(((e.vidaUtilAnos||5)||5)*12);if(dep)ativos.push([`${e.nome||'Equipamento'} · depreciação`,dep]);});
  const si=f.sistemas||{};[['Software / sistema',si.software],['Serviços contábeis',si.contabil],['Aluguel maquininha',si.aluguelMaquininha]].forEach(([n,v])=>{if(v)ativos.push([n,v]);});
  (f.veiculos||[]).forEach(v=>{const m=(v.parcela||0)+((v.ipvaAnual||0)/12)+((v.seguroAnual||0)/12)+(v.combustivel||0);if(m)ativos.push([v.nome||'Veículo',m]);});
  if(ativos.length)g.push(['Ativos e veículos',ativos]);
  const mk=f.marketing||{};const market=[];
  if(mk.agencia)market.push(['Agência / freelancer',mk.agencia]);
  (mk.canais||[]).forEach(c=>{if(c.valor)market.push([c.nome||'Canal de mídia',c.valor]);});
  const brindes=(mk.brindeUnit||0)*(mk.brindeQtd||0);if(brindes)market.push(['Brindes',brindes]);
  if(market.length)g.push(['Marketing e vendas',market]);
  const outros=[];
  (f.custosFixos||[]).forEach(x=>{if(x.valor)outros.push([x.nome||'Custo fixo',x.valor]);});
  (f.provisoes||[]).forEach(x=>{if(x.valor)outros.push([x.nome||'Provisão',x.valor]);});
  if(outros.length)g.push(['Outros custos e provisões',outros]);
  return g;
}
