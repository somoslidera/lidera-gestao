<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1D3573" />
<title>Lidera Gestão — Lucro e Liberdade</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --navy:#1D3573;--navy-700:#172b5e;--navy-900:#10203f;
  --gold:#A48A57;--gold-soft:#C2A875;--off:#F2F2F2;
  --bg:#F5F6F9;--card:#FFFFFF;--line:#E6E8EE;--ink:#1B2235;--muted:#6B7384;--soft:#9AA1B1;
  --green:#1E9E6A;--green-bg:#E5F4EC;--red:#D2483F;--red-bg:#FBE9E7;
  --amber:#C9892A;--amber-bg:#FBF1DE;--blue-bg:#E9EDF7;
  --radius:14px;--shadow:0 1px 2px rgba(16,32,63,.04),0 8px 24px rgba(16,32,63,.06);--shadow-lg:0 12px 40px rgba(16,32,63,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
.serif{font-family:'Fraunces',Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}

.sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg,#1D3573 0%,#162A5C 100%);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:24px 24px 18px}
.brand .wm{font-size:30px;font-weight:600;letter-spacing:-.5px;line-height:1}
.brand .sub{font-size:9px;letter-spacing:2.6px;color:var(--gold-soft);margin-top:7px;font-weight:600}
.brand .prog{font-size:11px;color:rgba(255,255,255,.5);margin-top:12px}
.nav{padding:6px 14px;flex:1;overflow-y:auto}
.nav .lbl{font-size:10px;letter-spacing:1.6px;color:rgba(255,255,255,.4);padding:12px 12px 5px;font-weight:600}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.78);text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:2px;transition:.15s;position:relative}
.nav a svg{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav a:hover{background:rgba(255,255,255,.07);color:#fff}
.nav a.active{background:rgba(255,255,255,.12);color:#fff}
.nav a.active::before{content:"";position:absolute;left:-14px;top:7px;bottom:7px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav a.active svg{opacity:1;color:var(--gold-soft)}
.side-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.45)}
.side-foot b{color:rgba(255,255,255,.8);font-weight:600}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{min-height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:20}
.topbar .menu-btn{display:none}
.topbar h1{font-size:19px;font-weight:600;letter-spacing:-.3px;flex:1}
.content{padding:28px 36px;max-width:1560px;width:100%;margin:0 auto}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.15s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-700)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#937A4A}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{border-color:var(--soft);background:#FAFBFC}
.btn-sm{padding:7px 12px;font-size:12.5px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:22px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.section-head .ttl{font-size:15px;font-weight:600}
.section-head .desc{font-size:13px;color:var(--muted);margin-top:2px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.kpi .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
.kpi .ic svg{width:19px;height:19px}
.kpi .k-lbl{font-size:12.5px;color:var(--muted);font-weight:500}
.kpi .k-val{font-size:25px;font-weight:700;letter-spacing:-.6px;margin-top:4px;font-family:'Fraunces',serif}
.kpi .k-sub{font-size:12px;margin-top:6px;display:flex;align-items:center;gap:5px;font-weight:600}
.trend-up{color:var(--green)}.trend-down{color:var(--red)}
.ic-navy{background:var(--blue-bg);color:var(--navy)}.ic-gold{background:var(--amber-bg);color:var(--amber)}
.ic-green{background:var(--green-bg);color:var(--green)}.ic-red{background:var(--red-bg);color:var(--red)}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--soft);font-weight:600;padding:11px 13px;border-bottom:1px solid var(--line)}
tbody td{padding:12px 13px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAFBFC}
.num{text-align:right;font-variant-numeric:tabular-nums}
th.num{text-align:right}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.tag-green{background:var(--green-bg);color:var(--green)}.tag-red{background:var(--red-bg);color:var(--red)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}.tag-navy{background:var(--blue-bg);color:var(--navy)}
.tag-gray{background:#EEF0F4;color:var(--muted)}.tag-gold{background:var(--amber-bg);color:var(--gold)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;color:var(--muted)}
.icon-btn:hover{color:var(--navy);border-color:var(--soft)}
.icon-btn.del:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}
.icon-btn svg{width:15px;height:15px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty svg{width:42px;height:42px;opacity:.3;margin-bottom:14px}
.empty .t{font-weight:600;color:var(--ink);font-size:15px}
.empty .d{font-size:13.5px;margin-top:5px}

.modal-overlay{position:fixed;inset:0;background:rgba(16,32,63,.45);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:34px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:18px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);animation:pop .18s ease}
.modal.wide{max-width:820px}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:20px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:17px;font-weight:600;font-family:'Fraunces',serif}
.modal-head .x{width:32px;height:32px;border-radius:8px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-head .x:hover{background:#F0F1F5;color:var(--ink)}
.modal-body{padding:22px 26px;max-height:66vh;overflow-y:auto}
.modal-foot{padding:16px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:#FAFBFC;border-radius:0 0 18px 18px}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.field .hint{font-size:11.5px;color:var(--soft);font-weight:400;margin-left:4px}
.input,select.input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;color:var(--ink);transition:.15s}
.input:focus,select.input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(29,53,115,.1)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.switch-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:15px;background:#FAFBFC}
.switch{width:42px;height:24px;border-radius:14px;background:#CBD2DE;position:relative;transition:.2s;flex-shrink:0}
.switch.on{background:var(--navy)}
.switch i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.switch.on i{left:21px}

.comp-row{display:grid;grid-template-columns:24px 1fr 86px 80px 32px;gap:9px;align-items:center;margin-bottom:9px}
.comp-row .ctype{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.ctype-i{background:var(--blue-bg);color:var(--navy)}.ctype-f{background:var(--amber-bg);color:var(--gold)}
.comp-row .ccost{font-size:12.5px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}
.mini-del{width:32px;height:36px;border-radius:9px;border:1px solid var(--line);color:var(--soft);display:flex;align-items:center;justify-content:center}
.mini-del:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}

.calc-box{background:linear-gradient(135deg,#1D3573,#172b5e);color:#fff;border-radius:14px;padding:18px;margin-top:6px}
.calc-box .line{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.1)}
.calc-box .line:last-child{border-bottom:none}
.calc-box .line span:first-child{color:rgba(255,255,255,.72)}
.calc-box .line b{font-weight:600;font-variant-numeric:tabular-nums}
.calc-box .big b{font-size:17px;color:var(--gold-soft);font-family:'Fraunces',serif}
.chan-tabs{display:flex;gap:8px;margin:14px 0 10px}
.chan-tabs button{flex:1;padding:9px;border-radius:9px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--muted)}
.chan-tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}

.matrix-wrap{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;align-items:start}
.matrix{position:relative;aspect-ratio:1/1;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.quad{position:absolute;width:50%;height:50%;display:flex;align-items:flex-start;padding:12px 14px}
.quad .ql{font-size:12px;font-weight:700}.quad .qd{font-size:10.5px;opacity:.7;font-weight:500}
.q-star{background:rgba(30,158,106,.07)}.q-horse{background:rgba(29,53,115,.06)}
.q-puzzle{background:rgba(201,137,42,.08)}.q-dog{background:rgba(210,72,63,.06)}
.matrix .axis-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
.matrix .axis-h{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--line)}
.dot{position:absolute;width:32px;height:32px;border-radius:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.18);transition:.15s}
.dot:hover{transform:translate(-50%,-50%) scale(1.18);z-index:5}
.axis-label{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;font-weight:600}
.axis-label-y{position:absolute;left:-8px;top:50%;transform:rotate(-90deg) translateX(50%);transform-origin:left;font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}

.dre-table .grp td{font-weight:700;background:#FAFBFC}
.dre-table .ind td:first-child{padding-left:28px;color:var(--muted)}
.dre-table .total td{font-weight:700;border-top:2px solid var(--navy);font-size:14.5px}
.bar{height:8px;border-radius:5px;background:#EEF0F4;overflow:hidden;margin-top:6px}
.bar > i{display:block;height:100%;border-radius:5px}

.chart{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:10px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.chart .col .bw{width:100%;max-width:38px;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.chart .col .b{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#2a4488,#1D3573)}
.chart .col .cl{font-size:11px;color:var(--muted);font-weight:500;text-align:center}
.chart .col .cv{font-size:10.5px;color:var(--soft);font-variant-numeric:tabular-nums}

.alert{display:flex;gap:11px;align-items:flex-start;padding:12px 14px;border-radius:11px;margin-bottom:9px;font-size:13px}
.alert svg{width:17px;height:17px;flex-shrink:0;margin-top:1px}
.alert-red{background:var(--red-bg);color:#9e342c}.alert-amber{background:var(--amber-bg);color:#8a5e1c}
.alert-green{background:var(--green-bg);color:#13633f}
.alert b{font-weight:700}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-900);color:#fff;padding:13px 22px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;display:flex;align-items:center;gap:9px;animation:pop .2s}
.toast svg{width:17px;height:17px;color:var(--gold-soft)}
.pill-filter{display:flex;gap:6px;flex-wrap:wrap}
.pill-filter button{padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:600;background:#fff;border:1px solid var(--line);color:var(--muted)}
.pill-filter button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.dash-pill{display:flex;flex-direction:column;gap:1px;padding:7px 14px;border:1px solid var(--line);border-radius:11px;background:#FAFBFC;min-width:96px}
.dash-pill span{font-size:10.5px;color:var(--soft);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.dash-pill b{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.legend{display:flex;flex-direction:column;gap:9px}
.legend .li{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:11px}
.legend .sw{width:13px;height:13px;border-radius:4px;flex-shrink:0;margin-top:2px}
.legend .li b{font-size:13px;display:block}.legend .li small{font-size:11.5px;color:var(--muted)}
.health-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.be-ring{display:flex;align-items:center;gap:18px}
.be-num{font-size:30px;font-weight:700;font-family:'Fraunces',serif;letter-spacing:-.5px}

@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:.25s;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .topbar .menu-btn{display:flex;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);align-items:center;justify-content:center;color:var(--ink)}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .matrix-wrap{grid-template-columns:1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr!important}
  .buffet-grid{grid-template-columns:1fr!important}
  .content{padding:16px}
  .backdrop{position:fixed;inset:0;background:rgba(16,32,63,.4);z-index:40}
}
@media(max-width:560px){.kpi-grid{grid-template-columns:1fr}.comp-row{grid-template-columns:24px 1fr 70px 64px 30px}}
.hidden{display:none!important}
.scroll-x{overflow-x:auto}
.print-only{display:none}
@media print{
  .sidebar,.topbar,.no-print,#toastRoot,#modalRoot,.backdrop{display:none!important}
  body{display:block;background:#fff}
  .main{display:block}
  .content{padding:0!important;max-width:none!important;margin:0!important}
  .card{box-shadow:none!important;border:1px solid #ccc;break-inside:avoid}
  .print-only{display:block!important}
  table{font-size:12px}
  a[href]:after{content:''}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="wm serif">Lidera</div>
    <div class="sub">DESENVOLVA · INSPIRE · LIDERE</div>
    <div class="prog">Programa Lucro e Liberdade</div>
  </div>
  <nav class="nav" id="nav">
    <div class="lbl">GESTÃO</div>
    <a data-route="dashboard" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Dashboard</a>
    <a data-route="insumos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h18M3 12h18M3 17h12"/></svg>Insumos</a>
    <a data-route="fichas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v6M15 2v6M7 8h10l-1 12a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2L7 8z"/></svg>Fichas Técnicas</a>
    <a data-route="estoque"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7M12 11v10"/></svg>Estoque &amp; Compras</a>
    <div class="lbl">INTELIGÊNCIA</div>
    <a data-route="engenharia"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-6"/></svg>Engenharia de Menu</a>
    <a data-route="cmv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18v4H3zM3 10h18v10H3z"/><path d="M7 14h4M7 17h7"/></svg>Controle de CMV</a>
    <a data-route="buffet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11h18M5 11a7 7 0 0 1 14 0M4 13v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1M8 19h8"/></svg>Mapa do Buffet</a>
    <a data-route="faturamento"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></svg>Faturamento</a>
    <a data-route="dre"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>DRE</a>
    <div class="lbl">FINANCEIRO</div>
    <a data-route="financeiro"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18v13H3z"/><path d="M3 10h18M7 15h4"/></svg>Financeiro</a>
    <div class="lbl">SUA CONTA</div>
    <a data-route="mapa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"/><path d="M9 3v15M15 6v15"/></svg>Mapa do Caminho</a>
    <a data-route="equipe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 6a3 3 0 0 1 0 6M21 20a6 6 0 0 0-3-5"/></svg>Equipe</a>
    <a data-route="conta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Configurações</a>
  </nav>
  <div class="side-foot"><b id="footName">Seu Restaurante</b><br/><span id="footStats">—</span></div>
</aside>
<div class="backdrop hidden" id="backdrop" onclick="toggleSidebar(false)"></div>

<div class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar(true)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <h1 id="pageTitle">Dashboard</h1>
    <div id="topActions"></div>
  </header>
  <main class="content" id="view"></main>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
/* ============================================================

/* ===================== MOTOR DE CÁLCULO ===================== */
function custoInsumoBase(ins,_seen){ // custo por 1 unidade-base (g/ml/un) do insumo
  if(!ins) return 0;
  if(ins.tipo==='preparado'){ // sub-receita: soma dos ingredientes ÷ rendimento
    _seen=_seen||new Set(); if(_seen.has(ins.id)) return 0; _seen.add(ins.id); // anti-ciclo
    let total=0;(ins.comps||[]).forEach(([cid,q])=>{const c=DB.insumos[cid];if(c)total+=custoInsumoBase(c,_seen)*(q||0);});
    const baseQty=(ins.rendimento||1)*(TO_BASE[ins.uni]||1);
    return baseQty? total/baseQty : 0;
  }
  const totalBase=(ins.qtd||1)*(TO_BASE[ins.uni]||1);
  return totalBase? ins.preco/totalBase : 0;
}
function custoFicha(ficha){ // soma dos insumos da ficha (sem embalagem)
  return (ficha.comps||[]).reduce((s,c)=>{const ins=DB.insumos[c[0]];return s+(ins?custoInsumoBase(ins)*(c[1]||0):0);},0);
}
function custoProduto(ficha){ // custo por porção vendida = insumos/porção + embalagem
  return custoFicha(ficha)/(ficha.porcoes||1)+(ficha.custoEmbalagem||0);
}
function pesoFichaKg(ficha){ // peso total da receita em Kg (insumos de massa/volume)
  let g=0;(ficha.comps||[]).forEach(([id,q])=>{const ins=DB.insumos[id];if(!ins)return;const b=BASE[ins.uni];if(b==='g'||b==='ml')g+=(q||0);});
  return g/1000;
}
function custoPorKgFicha(ficha){ // custo de 1 Kg do prato pronto
  const kg=pesoFichaKg(ficha), ct=custoFicha(ficha);
  return kg>0? ct/kg : custoProduto(ficha);
}
function impostoVarPct(){return DB.fin.regime==='simples'?(DB.fin.aliquota||0):0;}
function metricasCanal(ficha,canal){ // canal: 'balcao' | 'ifood'
  const custo=custoProduto(ficha);
  const preco = canal==='ifood' ? (ficha.precoIfood||ficha.precoVenda||0) : (ficha.precoVenda||0);
  const comissao = canal==='ifood' ? (DB.fin.comissaoIfood||0) : 0;
  const descPct=(comissao+impostoVarPct())/100;
  const mc = preco - custo - preco*descPct;       // margem de contribuição R$
  const mcPct = preco? mc/preco*100 : 0;
  const cmv = preco? custo/preco*100 : 0;
  return {preco,custo,comissaoPct:comissao,impostoPct:impostoVarPct(),mc,mcPct,cmv,markup:custo?preco/custo:0};
}
function metricasFicha(ficha){ // mistura por canal usando mix iFood global
  const b=metricasCanal(ficha,'balcao'), i=metricasCanal(ficha,'ifood');
  const mix=(DB.fat.mixIfood||0)/100;
  const precoBlend=b.preco*(1-mix)+i.preco*mix;
  const mcBlend=b.mc*(1-mix)+i.mc*mix;
  const cmvBlend=precoBlend?(b.custo/precoBlend*100):0;
  const vendas=ficha.vendasMes||0;
  return {balcao:b,ifood:i,custo:b.custo,precoBlend,mcBlend,cmvBlend,
    mcPctBlend:precoBlend?mcBlend/precoBlend*100:0,vendas,
    receita:precoBlend*vendas, mcTotal:mcBlend*vendas,
    health: healthFicha(b.cmv)};
}
function healthFicha(cmv){return cmv<=30?'saudavel':cmv<=35?'atencao':'critico';}
function fichasVendaveis(){return Object.values(DB.fichas);}
function folhaTotal(){return (DB.fin.funcionarios||[]).reduce((s,f)=>s+(f.salario||0),0);}
function proLaboreTotal(){return (DB.fin.socios||[]).reduce((s,x)=>s+(x.proLabore||0),0);}
function custosFixosTotais(){
  const desp=(DB.fin.custosFixos||[]).reduce((s,d)=>s+(d.valor||0),0);
  const prov=(DB.fin.provisoes||[]).reduce((s,d)=>s+(d.valor||0),0);
  return desp+folhaTotal()+proLaboreTotal()+prov;
}
function totaisGerais(){
  let receitaEst=0,custoTot=0,vendas=0,recIfoodEst=0,recDiretoEst=0;
  const mix=(DB.fat.mixIfood||0)/100;
  fichasVendaveis().forEach(f=>{const m=metricasFicha(f);
    receitaEst+=m.receita; custoTot+=m.custo*m.vendas; vendas+=m.vendas;
    recIfoodEst+=m.ifood.preco*f.vendasMes*mix;
    recDiretoEst+=m.balcao.preco*f.vendasMes*(1-mix);});
  const faturamento=DB.fat.lancado>0?DB.fat.lancado:receitaEst;
  const escala=receitaEst>0?faturamento/receitaEst:1;
  const recIfood=recIfoodEst*escala, recDireto=recDiretoEst*escala, cmvRS=custoTot*escala;
  const comissaoRS=recIfood*((DB.fin.comissaoIfood||0)/100);
  const impostoRS=DB.fin.regime==='simples'?faturamento*((DB.fin.aliquota||0)/100):(DB.fin.impostoFixo||0);
  const taxaCartaoRS=recDireto*((DB.fin.taxaCartao||0)/100);
  const custosVar=cmvRS+comissaoRS+impostoRS+taxaCartaoRS;
  const fixosBase=(DB.fin.custosFixos||[]).reduce((s,d)=>s+(d.valor||0),0);
  const provisoesRS=(DB.fin.provisoes||[]).reduce((s,d)=>s+(d.valor||0),0);
  const folha=folhaTotal(), prol=proLaboreTotal();
  const fixos=fixosBase+folha+prol+provisoesRS;
  const mcRS=faturamento-custosVar;
  const mcPctMed=faturamento?mcRS/faturamento*100:0;
  const cmv=faturamento?cmvRS/faturamento*100:0;
  const ticket=vendas?faturamento/vendas:0;
  const lucro=mcRS-fixos;
  const dinheiroMesa=comissaoRS+taxaCartaoRS;
  const faturamentoEq=mcPctMed>0?fixos/(mcPctMed/100):Infinity;
  const diaEq=faturamento>0&&isFinite(faturamentoEq)?faturamentoEq/faturamento*30:Infinity;
  return {receita:receitaEst,faturamento,custoTot:cmvRS,cmv,vendas,ticket,
    recIfood,recDireto,comissaoRS,impostoRS,taxaCartaoRS,custosVar,custosVarPct:faturamento?custosVar/faturamento*100:0,
    fixosBase,provisoesRS,folha,prol,fixos,fixosPct:faturamento?fixos/faturamento*100:0,
    mcRS,mcPctMed,mcTot:mcRS,lucro,margemLiq:faturamento?lucro/faturamento*100:0,
    dinheiroMesa,dinheiroMesaPct:faturamento?dinheiroMesa/faturamento*100:0,faturamentoEq,diaEq};
}

/* ===================== DASHBOARD ===================== */
function gaugeSVG(pct){
  const p=clamp(pct,0,100), circ=Math.PI*70, off=circ*(1-p/100);
  const cor=pct>=100?'var(--green)':pct>=70?'var(--gold)':'var(--amber)';
  return `<svg width="190" height="108" viewBox="0 0 190 108">
    <path d="M22 92 A73 73 0 0 1 168 92" fill="none" stroke="var(--line)" stroke-width="13" stroke-linecap="round"/>
    <path d="M22 92 A73 73 0 0 1 168 92" fill="none" stroke="${cor}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${Math.PI*73}" stroke-dashoffset="${Math.PI*73*(1-p/100)}"/>
  </svg>`;
}

  const atencao=fichas.filter(x=>x.m.health==='atencao');

  const prejuizoIfood=fichas.filter(x=>x.m.ifood.mc<0);

  const diaEqTxt=!isFinite(t.diaEq)?'—':t.diaEq>30?'+30':Math.ceil(t.diaEq);
  const recLiquida=t.faturamento-t.impostoRS-t.comissaoRS-t.taxaCartaoRS;

  const status = t.lucro<0?['Atenção','tag-red','var(--red)']:t.margemLiq>=10?['Lucrativo','tag-green','var(--green)']:['Estável','tag-amber','var(--amber)'];
  const hoje=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  // gauge faturado vs meta(equilíbrio)
  const gpct=isFinite(t.faturamentoEq)&&t.faturamentoEq>0?t.faturamento/t.faturamentoEq*100:100;
  // estrutura de custos por grupo
  const grupos={};
  (DB.fin.custosFixos||[]).forEach(d=>{const g=d.grupo||'Outros';grupos[g]=(grupos[g]||0)+(d.valor||0);});

  const estrutura=[['CMV Teórico',t.custoTot,'var(--red)'],['Pessoal + Sócios',grupos['Pessoal']||0,'var(--navy)'],
    ['Infraestrutura',grupos['Infraestrutura']||0,'var(--gold)'],['Admin e Mkt',grupos['Admin e Mkt']||0,'var(--amber)']];
  const estruturaTotal=estrutura.reduce((s,x)=>s+x[1],0);

function setInsTipo(t){draftInsTipo=t;$('#tp_pronto').classList.toggle('on',t==='pronto');$('#tp_prep').classList.toggle('on',t==='preparado');applyInsTipo();updInsPreview();}
function applyInsTipo(){const prep=draftInsTipo==='preparado';

function renderInsCompList(){
  const opts=Object.values(DB.insumos).filter(x=>x.id!==editingInsId).sort((a,b)=>a.nome.localeCompare(b.nome));
  const el=$('#insCompList'); if(!el)return;
  el.innerHTML=draftInsComps.length?draftInsComps.map((row,idx)=>{const ins=DB.insumos[row[0]];return`

function addInsComp(){draftInsComps.push(['',0]);renderInsCompList();updInsPreview();}
function updInsPreview(){const el=$('#i_preview');if(!el)return;const uni=$('#i_uni').value;

    el.innerHTML=`Custo da receita: <b>${fmtBRL(total)}</b> · Custo por ${BASE[uni]}: <b style="color:var(--navy)">${fmtBRL(c)}</b>`;

function saveInsumo(id){const nome=$('#i_nome').value.trim();if(!nome)return toast('Informe o nome do insumo');

  }else{obj={id:id||uid(),nome,cat,tipo:'pronto',uni,preco:parseFloat($('#i_preco').value)||0,qtd:parseFloat($('#i_qtd').value)||1};}
  DB.insumos[obj.id]=obj;save();closeModal();viewInsumos();toast(id?'Insumo atualizado':'Insumo adicionado');}
function delInsumo(id){
  const usadoFicha=Object.values(DB.fichas).some(f=>(f.comps||[]).some(c=>c[0]===id));
  const usadoPrep=Object.values(DB.insumos).some(x=>x.tipo==='preparado'&&(x.comps||[]).some(c=>c[0]===id));
  if((usadoFicha||usadoPrep)&&!confirm('Este insumo é usado em fichas ou preparos. Remover mesmo assim?'))return;
  delete DB.insumos[id];save();viewInsumos();toast('Insumo removido');}

function renderCompList(){

function renderModoList(){const el=$('#modoList');if(!el)return;

function addModo(){draftModo.push('');renderModoList();}
function recalcFicha(){
  const por=parseFloat($('#f_porcoes')?.value)||1;
  let bruto=0;draftComps.forEach(([cid,q])=>{const ins=DB.insumos[cid];if(ins)bruto+=custoInsumoBase(ins)*(q||0);});
  const emb=parseFloat($('#f_emb')?.value)||0;
  const custo=bruto/(por||1)+emb;
  const preco=parseFloat($('#f_preco')?.value)||0;
  const precoIf=parseFloat($('#f_precoIf')?.value)||preco;
  const impPct=impostoVarPct(), comIf=DB.fin.comissaoIfood||0;
  const mcB=preco-custo-preco*(impPct/100);
  const mcI=precoIf-custo-precoIf*((comIf+impPct)/100);
  const cmv=preco?custo/preco*100:0;
  const sug=DB.cmvAlvo?custo/(DB.cmvAlvo/100):0;
  const cc=v=>v<=30?'#9ee5c2':v<=35?'#f0cd8a':'#f3a39c';
  const box=$('#f_calc');if(!box)return;
  box.innerHTML=`<div class="calc-box">
    <div class="line"><span>Custo insumos + embalagem (CMV R$)</span><b>${fmtBRL(custo)}</b></div>
    <div class="line"><span>CMV %</span><b style="color:${cc(cmv)}">${fmtPct(cmv)}</b></div>
    <div class="line"><span>Preço sugerido p/ CMV ${fmtPct(DB.cmvAlvo)}</span><b style="color:#C2A875">${fmtBRL(sug)}</b></div>
    <div class="line big" style="margin-top:6px"><span>MC no balcão (preço ${fmtBRL(preco)})</span><b style="color:${mcB<0?'#f3a39c':'#9ee5c2'}">${fmtBRL(mcB)}</b></div>
    <div class="line"><span style="font-size:11.5px">após imposto ${fmtPct(impPct)}</span><b style="font-size:11.5px">${fmtPct(preco?mcB/preco*100:0)}</b></div>
    <div class="line big"><span>MC no iFood (preço ${fmtBRL(precoIf)})</span><b style="color:${mcI<0?'#f3a39c':'#9ee5c2'}">${fmtBRL(mcI)}</b></div>
    <div class="line"><span style="font-size:11.5px">após comissão ${fmtPct(comIf)} + imposto ${fmtPct(impPct)}</span><b style="font-size:11.5px">${fmtPct(precoIf?mcI/precoIf*100:0)}</b></div>
  </div>`;
}
function saveFicha(id){const nome=$('#f_nome').value.trim();if(!nome)return toast('Informe o nome');
  const comps=draftComps.filter(c=>c[0]&&c[1]>0);

    porcoes:parseFloat($('#f_porcoes').value)||1,custoEmbalagem:parseFloat($('#f_emb').value)||0,

    utensilios:$('#f_utens')?.value||'',modoPreparo:draftModo.filter(s=>(s||'').trim()),padraoFinalizacao:$('#f_final')?.value||'',comps};

function delFicha(id){if(!confirm('Remover esta ficha?'))return;delete DB.fichas[id];save();viewFichas();toast('Ficha removida');}

/* ===================== ENGENHARIA DE MENU ===================== */
function classificar(){
  const arr=fichasVendaveis().map(f=>{const m=metricasFicha(f);return{f,m,pop:f.vendasMes||0,marg:m.mcBlend};});
  if(!arr.length)return [];
  const avgPop=arr.reduce((s,x)=>s+x.pop,0)/arr.length;
  const avgMarg=arr.reduce((s,x)=>s+x.marg,0)/arr.length;
  arr.forEach((x,idx)=>{const hiP=x.pop>=avgPop,hiM=x.marg>=avgMarg;
    x.classe=hiP&&hiM?'Estrelas':hiP&&!hiM?'Populares':!hiP&&hiM?'Potenciais':'Críticos';
    x.avgPop=avgPop;x.avgMarg=avgMarg;x.n=idx+1;});
  return arr;
}
function viewEngenharia(){
  const arr=classificar();
  if(!arr.length){$('#view').innerHTML=`<div class="card">${emptyState('Sem dados','Cadastre fichas com preço e vendas.','go(&#39;fichas&#39;)')}</div>`;return;}
  const avgPop=arr[0].avgPop,avgMarg=arr[0].avgMarg;
  const maxPop=Math.max(...arr.map(x=>x.pop)),minPop=Math.min(...arr.map(x=>x.pop));
  const maxMarg=Math.max(...arr.map(x=>x.marg)),minMarg=Math.min(...arr.map(x=>x.marg));
  const colorOf=c=>c==='Estrelas'?'#1E9E6A':c==='Populares'?'#1D3573':c==='Potenciais'?'#C9892A':'#D2483F';
  const px=v=>v>=avgPop?50+((v-avgPop)/((maxPop-avgPop)||1))*40:10+((v-minPop)/((avgPop-minPop)||1))*40;
  const py=v=>v>=avgMarg?50-((v-avgMarg)/((maxMarg-avgMarg)||1))*40:90-((v-minMarg)/((avgMarg-minMarg)||1))*40;
  $('#view').innerHTML=`
  <div class="matrix-wrap">
    <div>
      <div class="matrix">
        <div class="quad q-puzzle" style="top:0;left:0;right:auto;bottom:auto"><div><div class="ql" style="color:var(--amber)">◆ Potenciais</div><div class="qd">baixa saída · alta margem</div></div></div>
        <div class="quad q-star" style="top:0;right:0;left:auto;bottom:auto;justify-content:flex-end;text-align:right"><div><div class="ql" style="color:var(--green)">★ Estrelas</div><div class="qd">alta saída · alta margem</div></div></div>
        <div class="quad q-dog" style="bottom:0;left:0;top:auto;right:auto"><div><div class="ql" style="color:var(--red)">▼ Críticos</div><div class="qd">baixa saída · margem baixa</div></div></div>
        <div class="quad q-horse" style="bottom:0;right:0;top:auto;left:auto;justify-content:flex-end;text-align:right"><div><div class="ql" style="color:var(--navy)">● Populares</div><div class="qd">alta saída · margem baixa</div></div></div>
        <div class="axis-v"></div><div class="axis-h"></div>
        ${arr.map(x=>`<div class="dot" style="left:${px(x.pop)}%;top:${py(x.marg)}%;background:${colorOf(x.classe)}" title="${x.f.nome} — ${x.classe}&#10;Vendas: ${x.pop} · MC: ${fmtBRL(x.marg)}">${x.n}</div>`).join('')}
      </div>
      <div class="axis-label">Popularidade (vendas/mês) →</div>
      <div class="axis-label-y">Margem de contribuição →</div>
    </div>
    <div>
      <div class="card card-pad" style="margin-bottom:16px"><div class="ttl" style="margin-bottom:12px">Pratos</div>
        <div style="display:flex;flex-direction:column;gap:8px">${[...arr].sort((a,b)=>b.marg-a.marg).map(x=>`
          <div style="display:flex;align-items:center;gap:10px;font-size:13px">
            <span class="dot" style="position:static;transform:none;width:24px;height:24px;font-size:10px;background:${colorOf(x.classe)};box-shadow:none">${x.n}</span>
            <b style="flex:1">${x.f.nome}</b>
            <span style="font-size:11.5px;color:var(--muted)">${fmtBRL(x.marg)}</span>
            <span class="tag ${x.classe==='Estrelas'?'tag-green':x.classe==='Populares'?'tag-navy':x.classe==='Potenciais'?'tag-amber':'tag-red'}">${x.classe}</span>
          </div>`).join('')}</div>
      </div>
      ${planoAcao()}
    </div>
  </div>`;
}
function planoAcao(){
  const cls=classificar();
  const d=[['Estrelas','#1E9E6A','Alta popularidade e alta rentabilidade. Destaque no cardápio e proteja a qualidade.'],
    ['Populares','#1D3573','Alta saída, margem baixa — reduza custo do insumo ou ajuste preço com cautela.'],
    ['Potenciais','#C9892A','Boa margem, vende pouco — reposicione, sugira e treine a equipe.'],
    ['Críticos','#D2483F','Baixa popularidade e baixa rentabilidade — candidato a sair do cardápio ou reformular.']];
  return `<div class="card card-pad"><div class="ttl" style="margin-bottom:12px">Plano de ação</div>
  <div class="legend">${d.map(([n,c,t])=>`<div class="li"><div class="sw" style="background:${c}"></div><div><b>${n}<span style="float:right;color:var(--muted)">${cls.filter(x=>x.classe===n).length}</span></b><small>${t}</small></div></div>`).join('')}</div></div>`;
}

let finTab='visao';
const FIN_TEMPLATES={
  contasPagar:()=>({id:uid(),descricao:'',categoria:'',vencimento:'',valor:0,pago:false}),
  contasReceber:()=>({id:uid(),descricao:'',categoria:'',vencimento:'',valor:0,recebido:false}),
  funcionarios:()=>({id:uid(),nome:'',cargo:'',salario:0}),
  socios:()=>({id:uid(),nome:'',proLabore:0}),
  meiosPagamento:()=>({id:uid(),nome:'',tipo:'Crédito',taxa:0}),
  fornecedores:()=>({id:uid(),nome:'',contato:''}),
  contasBancarias:()=>({id:uid(),nome:'',saldo:0}),
  custosFixos:()=>({id:uid(),nome:'',valor:0,grupo:'Infraestrutura'}),
  provisoes:()=>({id:uid(),nome:'',valor:0}),
};
function finAdd(key){DB.fin[key]=DB.fin[key]||[];DB.fin[key].push(FIN_TEMPLATES[key]());save();viewFinanceiro();}
function finTouch(){clearTimeout(window._finT);window._finT=setTimeout(()=>{save();},450);}
function finList(key,cols){
  const arr=DB.fin[key]||[];
  const grid=cols.map(c=>c.w||'1fr').join(' ')+' 34px';
  return `${arr.length?arr.map((row,i)=>`<div class="comp-row" style="grid-template-columns:${grid};align-items:center">
    ${cols.map(c=>{
      if(c.type==='select')return `<select class="input" onchange="DB.fin['${key}'][${i}]['${c.f}']=this.value;save()">${c.opts.map(o=>`<option ${row[c.f]===o?'selected':''}>${o}</option>`).join('')}</select>`;
      if(c.type==='check')return `<button class="icon-btn" onclick="DB.fin['${key}'][${i}]['${c.f}']=!DB.fin['${key}'][${i}]['${c.f}'];save();viewFinanceiro()" title="${c.ph||''}" style="${row[c.f]?'background:var(--green-bg);color:var(--green);border-color:var(--green)':''}">${row[c.f]?'✓':'○'}</button>`;
      return `<input class="input" ${c.type==='num'?'type="number" step="0.01"':c.type==='date'?'type="date"':''} value="${c.type==='num'?(row[c.f]||0):((row[c.f]==null?'':row[c.f]).toString().replace(/"/g,'&quot;'))}" placeholder="${c.ph||''}" oninput="DB.fin['${key}'][${i}]['${c.f}']=${c.type==='num'?'parseFloat(this.value)||0':'this.value'};finTouch()">`;
    }).join('')}
    <button class="mini-del" onclick="DB.fin['${key}'].splice(${i},1);save();viewFinanceiro()">${icoX}</button></div>`).join(''):`<div style="font-size:13px;color:var(--soft);padding:6px 0 4px">Nenhum registro.</div>`}
  <button class="btn btn-ghost btn-sm" onclick="finAdd('${key}')" style="margin-top:6px">${icoPlus} Adicionar</button>`;
}
function viewFinanceiro(){
  const t=totaisGerais();
  const tabs=[['visao','Visão Geral'],['pagar','Contas a Pagar'],['receber','Contas a Receber'],['func','Funcionários'],['socios','Sócios'],['meios','Meios de Pagamento'],['forn','Fornecedores'],['param','Parâmetros']];
  let body='';
  if(finTab==='visao')body=finVisao(t);
  else if(finTab==='pagar')body=finCard('Contas a Pagar','Lançamentos a vencer e pagos',
    finList('contasPagar',[{f:'descricao',ph:'Descrição',w:'1.4fr'},{f:'categoria',ph:'Categoria',w:'1fr'},{f:'vencimento',type:'date',w:'150px'},{f:'valor',type:'num',ph:'R$',w:'110px'},{f:'pago',type:'check',ph:'Pago?',w:'34px'}]),
    `Total em aberto: <b>${fmtBRL((DB.fin.contasPagar||[]).filter(x=>!x.pago).reduce((s,x)=>s+x.valor,0))}</b>`);
  else if(finTab==='receber')body=finCard('Contas a Receber','Valores a receber',
    finList('contasReceber',[{f:'descricao',ph:'Descrição',w:'1.4fr'},{f:'categoria',ph:'Categoria',w:'1fr'},{f:'vencimento',type:'date',w:'150px'},{f:'valor',type:'num',ph:'R$',w:'110px'},{f:'recebido',type:'check',ph:'Recebido?',w:'34px'}]),
    `Total a receber: <b>${fmtBRL((DB.fin.contasReceber||[]).filter(x=>!x.recebido).reduce((s,x)=>s+x.valor,0))}</b>`);
  else if(finTab==='func')body=finCard('Funcionários','Folha de pagamento (CLT)',
    finList('funcionarios',[{f:'nome',ph:'Nome',w:'1.4fr'},{f:'cargo',ph:'Cargo',w:'1fr'},{f:'salario',type:'num',ph:'R$',w:'120px'}]),
    `Folha base: <b>${fmtBRL(folhaTotal())}</b>`);
  else if(finTab==='socios')body=finCard('Sócios','Pró-labore dos sócios',
    finList('socios',[{f:'nome',ph:'Nome',w:'1.6fr'},{f:'proLabore',type:'num',ph:'R$',w:'140px'}]),
    `Pró-labore total: <b>${fmtBRL(proLaboreTotal())}</b>`);
  else if(finTab==='meios')body=finCard('Meios de Pagamento','Taxas por meio de recebimento',
    finList('meiosPagamento',[{f:'nome',ph:'Nome',w:'1.4fr'},{f:'tipo',type:'select',opts:['Crédito','Débito','Marketplace','PIX','Dinheiro','Voucher'],w:'1fr'},{f:'taxa',type:'num',ph:'%',w:'100px'}]),
    `<span style="color:var(--muted)">A comissão de marketplace usada no cálculo é definida em <b>Parâmetros</b>.</span>`);
  else if(finTab==='forn')body=finCard('Fornecedores','Cadastro de fornecedores',
    finList('fornecedores',[{f:'nome',ph:'Nome',w:'1.4fr'},{f:'contato',ph:'Contato / telefone',w:'1.4fr'}]),'');
  else if(finTab==='param')body=finParam();
  $('#view').innerHTML=`<div class="pill-filter" style="margin-bottom:18px">${tabs.map(([k,l])=>`<button class="${finTab===k?'on':''}" onclick="finTab='${k}';viewFinanceiro()">${l}</button>`).join('')}</div>${body}`;
}
function finCard(ttl,desc,inner,foot){
  return `<div class="card card-pad" style="max-width:880px">
    <div class="section-head"><div><div class="ttl">${ttl}</div><div class="desc">${desc}</div></div></div>
    ${inner}
    ${foot?`<div style="border-top:1px solid var(--line);margin-top:14px;padding-top:12px;font-size:14px;text-align:right">${foot}</div>`:''}</div>`;
}
function finVisao(t){
  const saldoConta=(DB.fin.contasBancarias||[]).reduce((s,x)=>s+(x.saldo||0),0);
  const aPagar=(DB.fin.contasPagar||[]).filter(x=>!x.pago).reduce((s,x)=>s+x.valor,0);
  const aReceber=(DB.fin.contasReceber||[]).filter(x=>!x.recebido).reduce((s,x)=>s+x.valor,0);
  const projetado=saldoConta+aReceber-aPagar;
  const recLiq=t.faturamento-t.impostoRS-t.comissaoRS-t.taxaCartaoRS;
  const venc=[...(DB.fin.contasPagar||[]).filter(x=>!x.pago)].sort((a,b)=>(a.vencimento||'').localeCompare(b.vencimento||''));
  const fmtData=d=>{if(!d)return '—';const p=d.split('-');return p.length===3?`${p[2]}/${p[1]}`:d;};
  return `
  <div class="kpi-grid">
    <div class="kpi"><div class="k-lbl">Saldo em conta</div><div class="k-val">${fmtBRL(saldoConta)}</div><div class="k-sub" style="color:var(--soft)">${(DB.fin.contasBancarias||[]).length} conta(s)</div></div>
    <div class="kpi"><div class="k-lbl">A pagar (em aberto)</div><div class="k-val" style="color:var(--red)">${fmtBRL(aPagar)}</div><div class="k-sub trend-down">${(DB.fin.contasPagar||[]).filter(x=>!x.pago).length} lançamento(s)</div></div>
    <div class="kpi"><div class="k-lbl">A receber</div><div class="k-val" style="color:var(--green)">${fmtBRL(aReceber)}</div><div class="k-sub trend-up">${(DB.fin.contasReceber||[]).filter(x=>!x.recebido).length} lançamento(s)</div></div>
    <div class="kpi"><div class="k-lbl">Saldo projetado</div><div class="k-val" style="color:${projetado>=0?'var(--green)':'var(--red)'}">${fmtBRL(projetado)}</div><div class="k-sub" style="color:var(--soft)">conta + receber − pagar</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:20px" class="dash-grid">
    <div class="card card-pad">
      <div class="section-head"><div><div class="ttl">Resultado do mês</div><div class="desc">Estimado pelas fichas e parâmetros</div></div></div>
      <table><tbody>
        <tr><td>Receita bruta</td><td class="num"><b>${fmtBRL(t.faturamento)}</b></td></tr>
        <tr><td>Receita líquida <span style="color:var(--soft);font-size:12px">(− impostos, comissões e taxas)</span></td><td class="num">${fmtBRL(recLiq)}</td></tr>
        <tr><td>Margem de contribuição</td><td class="num">${fmtBRL(t.mcRS)} · ${fmtPct(t.mcPctMed)}</td></tr>
        <tr><td>(−) Custos fixos + pessoal</td><td class="num" style="color:var(--red)">${fmtBRL(-t.fixos)}</td></tr>
        <tr style="border-top:2px solid var(--navy)"><td><b>Lucro líquido</b></td><td class="num"><b style="color:${t.lucro>=0?'var(--green)':'var(--red)'}">${fmtBRL(t.lucro)}</b></td></tr>
      </tbody></table>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <div class="dash-pill"><span>Folha (CLT)</span><b>${fmtBRL(t.folha)}</b></div>
        <div class="dash-pill"><span>Pró-labore</span><b>${fmtBRL(t.prol)}</b></div>
        <div class="dash-pill"><span>Provisões</span><b>${fmtBRL(t.provisoesRS)}</b></div>
      </div>
    </div>
    <div class="card card-pad">
      <div class="section-head"><div><div class="ttl">Próximos vencimentos</div><div class="desc">Contas a pagar em aberto</div></div></div>
      ${venc.length?venc.slice(0,8).map(x=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">
        <div style="width:42px;text-align:center"><div style="font-size:15px;font-weight:700;font-family:'Fraunces',serif;line-height:1">${(x.vencimento||'').split('-')[2]||'—'}</div><div style="font-size:9.5px;color:var(--soft)">${fmtData(x.vencimento).split('/')[1]?'/'+fmtData(x.vencimento).split('/')[1]:''}</div></div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${x.descricao||'—'}</div><div style="font-size:11px;color:var(--soft)">${x.categoria||''}</div></div>
        <div style="font-size:13.5px;font-weight:700;color:var(--red)">${fmtBRL(x.valor)}</div></div>`).join(''):`<div style="font-size:13px;color:var(--soft);padding:8px 0">Nenhum vencimento em aberto.</div>`}
    </div>
  </div>`;
}

        ${finList('provisoes',[{f:'nome',ph:'Nome',w:'1.5fr'},{f:'valor',type:'num',ph:'R$',w:'120px'}])}</div>
      <div style="border-top:1px solid var(--line);margin-top:16px;padding-top:12px;display:flex;justify-content:space-between;font-size:14px"><b>Total fixo + pessoal</b><b style="font-family:'Fraunces',serif">${fmtBRL(custosFixosTotais())}</b></div>

  </div>`;
}

/* ===================== MAPA DO CAMINHO ===================== */
function ringSVG(pct){const r=34,c=2*Math.PI*r,off=c*(1-clamp(pct,0,100)/100);
  return `<svg width="92" height="92" viewBox="0 0 92 92"><circle cx="46" cy="46" r="34" fill="none" stroke="var(--line)" stroke-width="9"/><circle cx="46" cy="46" r="34" fill="none" stroke="var(--green)" stroke-width="9" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 46 46)"/></svg>`;}
function viewMapa(){
  const nIns=Object.keys(DB.insumos).length, nFic=Object.keys(DB.fichas).length;
  const steps=[
    {nome:'Onboarding',desc:'Cadastro inicial do restaurante',done:!!(DB.conta&&DB.conta.restaurante),route:'conta'},
    {nome:'Insumos',desc:`${nIns} insumo(s) cadastrado(s)`,done:nIns>0,route:'insumos'},
    {nome:'Fichas Técnicas',desc:`${nFic} ficha(s) com custo`,done:nFic>0,route:'fichas'},
    {nome:'Engenharia de Menu',desc:'Matriz com preço e vendas',done:fichasVendaveis().some(f=>f.precoVenda>0&&f.vendasMes>0),route:'engenharia'},
    {nome:'Equipe',desc:`${(DB.fin.socios||[]).length} sócio(s) · ${(DB.fin.funcionarios||[]).length} funcionário(s)`,done:(DB.fin.socios||[]).length>0&&(DB.fin.funcionarios||[]).length>0,route:'financeiro'},
    {nome:'Financeiro',desc:'Gestão financeira ativa',done:(DB.fin.contasPagar||[]).length>0,route:'financeiro'},
  ];
  const done=steps.filter(s=>s.done).length, pct=Math.round(done/steps.length*100);
  $('#view').innerHTML=`<div class="card card-pad" style="max-width:760px">
    <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px">
      <div style="position:relative;flex-shrink:0">${ringSVG(pct)}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Fraunces',serif;font-size:19px">${pct}%</div></div>
      <div><div class="ttl" style="font-size:18px">Mapa do Caminho</div><div class="desc">${done} de ${steps.length} etapas concluídas — siga para destravar todo o potencial do app.</div></div>
    </div>
    ${steps.map(s=>`<div style="display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px">
      <div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;${s.done?'background:var(--green);color:#fff':'background:#EEF0F4;color:var(--soft)'}">${s.done?'✓':'○'}</div>
      <div style="flex:1"><div style="font-weight:600;font-size:14px">${s.nome} ${s.done?'<span class="tag tag-green" style="margin-left:6px">Concluído</span>':'<span class="tag tag-gray" style="margin-left:6px">Pendente</span>'}</div><div style="font-size:12px;color:var(--muted)">${s.desc}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="go('${s.route}')">Abrir</button>
    </div>`).join('')}
  </div>`;
}

const CMV_ALVO_BUFFET=0.30, REGRA_8020=0.80;
let buffetSub='mapa', buffetSel=null, buffetDrag=null;
function buffetData(){
  const b=DB.buffet||(DB.buffet={precoVendaKg:'',cubas:[]});
  const precoKg=parseFloat(b.precoVendaKg)||0;
  const cubas=(b.cubas||[]).map(c=>{
    const ficha=DB.fichas[c.fichaId];
    const ckg=ficha?custoPorKgFicha(ficha):0;
    const peso=parseFloat(c.pesoKg)||0;
    const custo=ckg*peso, receita=precoKg*peso, cmv=precoKg>0?ckg/precoKg:0;
    return {...c,ficha,ckg,peso,custo,receita,cmv,ok:precoKg>0&&cmv<=CMV_ALVO_BUFFET};
  });
  const comF=cubas.filter(c=>c.ficha);
  const totalCusto=comF.reduce((s,c)=>s+c.custo,0), totalReceita=comF.reduce((s,c)=>s+c.receita,0), totalPeso=comF.reduce((s,c)=>s+c.peso,0);
  const cmvBuffet=totalReceita>0?totalCusto/totalReceita:0;
  const dentro=comF.filter(c=>c.ok).length, perc=comF.length?dentro/comF.length:0;
  return {b,precoKg,cubas,comF,totalCusto,totalReceita,totalPeso,cmvBuffet,dentro,perc,conforme:perc>=REGRA_8020};
}
function cubaCol(c,precoKg){
  if(!c.ficha||precoKg<=0)return{bg:'#EEF0F4',br:'var(--line)',tx:'var(--muted)'};
  return c.cmv<=CMV_ALVO_BUFFET?{bg:'rgba(30,158,106,.14)',br:'var(--green)',tx:'#147a4f'}:{bg:'rgba(210,72,63,.12)',br:'var(--red)',tx:'#9e342c'};
}

function buffetAddCuba(){const n=(DB.buffet.cubas||[]).length;DB.buffet.cubas=DB.buffet.cubas||[];
  DB.buffet.cubas.push({id:uid(),fichaId:'',pesoKg:'3',rot:0,x:24+(n%8)*26,y:46+(n%8)*26,w:104,h:74});
  buffetSel=DB.buffet.cubas[DB.buffet.cubas.length-1].id;save();viewBuffet();}
function buffetUpdCuba(id,patch){const c=(DB.buffet.cubas||[]).find(x=>x.id===id);if(c)Object.assign(c,patch);save();}
function buffetDelCuba(id){DB.buffet.cubas=(DB.buffet.cubas||[]).filter(x=>x.id!==id);if(buffetSel===id)buffetSel=null;save();viewBuffet();}
function buffetRot(id){const c=(DB.buffet.cubas||[]).find(x=>x.id===id);if(c){c.rot=((c.rot||0)+90)%360;save();viewBuffet();}}
function buffetDeselect(e){if(e.target&&e.target.id==='buffetBoard'){buffetSel=null;viewBuffet();}}
function buffetCubaDown(e,id,mode){
  e.stopPropagation();e.preventDefault();buffetSel=id;
  const c=(DB.buffet.cubas||[]).find(x=>x.id===id);if(!c)return;
  const board=document.getElementById('buffetBoard');const br=board.getBoundingClientRect();
  buffetDrag={id,mode,sx:e.clientX,sy:e.clientY,ox:c.x,oy:c.y,ow:c.w,oh:c.h,bw:br.width,bh:br.height};
  window.addEventListener('pointermove',buffetCubaMove);window.addEventListener('pointerup',buffetCubaUp);
}
function buffetCubaMove(e){const d=buffetDrag;if(!d)return;const el=document.getElementById('cuba_'+d.id);if(!el)return;
  const dx=e.clientX-d.sx,dy=e.clientY-d.sy;
  if(d.mode==='move'){const x=Math.max(0,Math.min(d.bw-d.ow,d.ox+dx)),y=Math.max(0,Math.min(d.bh-d.oh,d.oy+dy));el.style.left=Math.round(x)+'px';el.style.top=Math.round(y)+'px';d.nx=Math.round(x);d.ny=Math.round(y);}
  else{const w=Math.max(44,Math.min(d.bw-d.ox,d.ow+dx)),h=Math.max(34,Math.min(d.bh-d.oy,d.oh+dy));el.style.width=Math.round(w)+'px';el.style.height=Math.round(h)+'px';d.nw=Math.round(w);d.nh=Math.round(h);}
}
function buffetCubaUp(){const d=buffetDrag;window.removeEventListener('pointermove',buffetCubaMove);window.removeEventListener('pointerup',buffetCubaUp);buffetDrag=null;if(!d)return;
  const c=(DB.buffet.cubas||[]).find(x=>x.id===d.id);if(c){if(d.mode==='move'&&d.nx!=null){c.x=d.nx;c.y=d.ny;}if(d.mode==='resize'&&d.nw!=null){c.w=d.nw;c.h=d.nh;}}
  save();viewBuffet();
}

/* ===================== CONTROLE DE CMV (Real por contagem) ===================== */
const MESES_PT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function semanaISO(iso){const p=(iso||'').split('-');if(p.length<3)return'';const dt=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day+3);const ft=new Date(Date.UTC(dt.getUTCFullYear(),0,4));const fd=(ft.getUTCDay()+6)%7;ft.setUTCDate(ft.getUTCDate()-fd+3);return 1+Math.round((dt-ft)/(7*24*3600*1000));}
function fmtDataBR(iso){const p=(iso||'').split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:'—';}
function cmvRegCalc(r){const ei=+r.ei||0,co=+r.compras||0,ef=+r.ef||0,ve=+r.vendas||0;const cmvRS=ei+co-ef;const pct=ve?cmvRS/ve*100:0;const cls=pct<28?'Excelente':pct<=35?'Aceitável':'Crítico';return {...r,ei,co,ef,ve,cmvRS,pct,cls};}
function cmvCls(cls){return cls==='Excelente'?'tag-green':cls==='Aceitável'?'tag-amber':'tag-red';}
function cmvClsCor(cls){return cls==='Excelente'?'var(--green)':cls==='Aceitável'?'var(--amber)':'var(--red)';}
let cmvAno='todos';
function viewCMV(){
  $('#topActions').innerHTML=`<button class="btn btn-primary" onclick="editCmvReg()">${icoPlus} Nova contagem</button>`;
  const regs=(DB.cmvRegistros||[]).map(cmvRegCalc).sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const anos=['todos',...new Set(regs.map(r=>(r.data||'').slice(0,4)).filter(Boolean))];
  if(!anos.includes(cmvAno))cmvAno='todos';
  const filt=cmvAno==='todos'?regs:regs.filter(r=>(r.data||'').slice(0,4)===cmvAno);
  const ultimo=filt[0];
  const totCMV=filt.reduce((s,r)=>s+r.cmvRS,0), totVen=filt.reduce((s,r)=>s+r.ve,0);
  const cmvMed=totVen?totCMV/totVen*100:0;
  const teorico=totaisGerais().cmv;
  const gap=cmvMed-teorico;
  // gráfico cronológico
  const chrono=[...filt].sort((a,b)=>(a.data||'').localeCompare(b.data||'')).slice(-12);
  const maxP=Math.max(35,...chrono.map(r=>r.pct));
  // resumo mensal
  const byM={};filt.forEach(r=>{const k=(r.data||'').slice(0,7);if(!k)return;(byM[k]=byM[k]||[]).push(r);});
  const meses=Object.keys(byM).sort().reverse().map(k=>{const arr=byM[k].slice().sort((a,b)=>(a.data||'').localeCompare(b.data||''));
    const ei=arr[0].ei, ef=arr[arr.length-1].ef, co=arr.reduce((s,r)=>s+r.co,0), ve=arr.reduce((s,r)=>s+r.ve,0);
    const pct=ve?(ei+co-ef)/ve*100:0;const cls=pct<28?'Excelente':pct<=35?'Aceitável':'Crítico';
    const [y,m]=k.split('-');return {label:`${MESES_PT[+m-1]}/${y}`,ei,co,ef,ve,pct,cls,n:arr.length};});

  $('#view').innerHTML=`
  <div class="section-head"><div><div class="ttl">CMV Real por contagem de estoque</div><div class="desc">CMV% = (Estoque inicial + Compras − Estoque final) ÷ Vendas</div></div>
    <div class="pill-filter">${anos.map(a=>`<button class="${a===cmvAno?'on':''}" onclick="cmvAno='${a}';viewCMV()">${a==='todos'?'Todos':a}</button>`).join('')}</div></div>
  <div class="kpi-grid">
    <div class="kpi"><div class="ic ic-${ultimo?(ultimo.cls==='Excelente'?'green':ultimo.cls==='Aceitável'?'gold':'red'):'navy'}">${ico('cmv')}</div><div class="k-lbl">CMV Real (última contagem)</div><div class="k-val">${ultimo?fmtPct(ultimo.pct):'—'}</div><div class="k-sub" style="color:var(--soft)">${ultimo?fmtDataBR(ultimo.data):'sem contagens'}</div></div>
    <div class="kpi"><div class="ic ic-navy">${ico('mc')}</div><div class="k-lbl">CMV Real médio</div><div class="k-val">${filt.length?fmtPct(cmvMed):'—'}</div><div class="k-sub" style="color:var(--soft)">${filt.length} contagem(ns)</div></div>
    <div class="kpi"><div class="ic ic-gold">${ico('cmv')}</div><div class="k-lbl">CMV Teórico (fichas)</div><div class="k-val">${fmtPct(teorico)}</div><div class="k-sub" style="color:var(--soft)">meta ${fmtPct(DB.cmvAlvo)}</div></div>
    <div class="kpi"><div class="ic ${gap<=2?'ic-green':gap<=5?'ic-amber':'ic-red'}">${ico('profit')}</div><div class="k-lbl">Diferença Real − Teórico</div><div class="k-val" style="color:${gap<=2?'var(--green)':gap<=5?'var(--amber)':'var(--red)'}">${(gap>=0?'+':'')}${fmtN(gap,1)} p.p.</div><div class="k-sub" style="color:var(--soft)">${gap>2?'desperdício/perda':'sob controle'}</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:20px" class="dash-grid">
    <div class="card card-pad">
      <div class="section-head"><div><div class="ttl">Evolução do CMV</div><div class="desc">Últimas contagens · meta ≤ ${fmtPct(DB.cmvAlvo)}</div></div></div>
      ${chrono.length?`<div class="chart">${chrono.map(r=>`<div class="col"><div class="cv">${fmtN(r.pct,0)}%</div><div class="bw"><div class="b" style="height:${Math.max(4,r.pct/maxP*100)}%;background:linear-gradient(180deg,${cmvClsCor(r.cls)},${cmvClsCor(r.cls)})"></div></div><div class="cl">${fmtDataBR(r.data).slice(0,5)}</div></div>`).join('')}</div>`:`<div style="font-size:13px;color:var(--soft);padding:20px 0">Sem contagens para exibir.</div>`}
    </div>
    <div class="card card-pad">
      <div class="section-head"><div><div class="ttl">Classificação</div></div></div>
      <div class="legend">
        <div class="li"><div class="sw" style="background:var(--green)"></div><div><b>Excelente <span style="float:right;color:var(--muted)">${filt.filter(r=>r.cls==='Excelente').length}</span></b><small>CMV abaixo de 28%</small></div></div>
        <div class="li"><div class="sw" style="background:var(--amber)"></div><div><b>Aceitável <span style="float:right;color:var(--muted)">${filt.filter(r=>r.cls==='Aceitável').length}</span></b><small>CMV entre 28% e 35%</small></div></div>
        <div class="li"><div class="sw" style="background:var(--red)"></div><div><b>Crítico <span style="float:right;color:var(--muted)">${filt.filter(r=>r.cls==='Crítico').length}</span></b><small>CMV acima de 35%</small></div></div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:20px">
    <div class="card-pad" style="padding-bottom:0"><div class="section-head"><div><div class="ttl">Contagens</div><div class="desc">Registros de apuração do CMV</div></div></div></div>
    ${filt.length?`<div class="scroll-x"><table>
      <thead><tr><th>Data</th><th class="num">Sem.</th><th class="num">Estoque inicial</th><th class="num">Compras</th><th class="num">Estoque final</th><th class="num">Vendas</th><th class="num">CMV</th><th></th></tr></thead>
      <tbody>${filt.map(r=>`<tr>
        <td><b>${fmtDataBR(r.data)}</b></td><td class="num">${semanaISO(r.data)}</td>
        <td class="num">${fmtBRL(r.ei)}</td><td class="num">${fmtBRL(r.co)}</td><td class="num">${fmtBRL(r.ef)}</td><td class="num">${fmtBRL(r.ve)}</td>
        <td class="num"><span class="tag ${cmvCls(r.cls)}">${fmtPct(r.pct)}</span></td>
        <td><div class="row-actions"><button class="icon-btn" onclick="editCmvReg('${r.id}')">${icoEdit}</button><button class="icon-btn del" onclick="delCmvReg('${r.id}')">${icoTrash}</button></div></td></tr>`).join('')}</tbody>
    </table></div>`:emptyState('Nenhuma contagem registrada','Registre a 1ª apuração de CMV com estoque inicial, compras, estoque final e vendas.','editCmvReg()')}
  </div>

  ${meses.length?`<div class="card" style="margin-top:20px">
    <div class="card-pad" style="padding-bottom:0"><div class="section-head"><div><div class="ttl">Resumo mensal</div></div></div></div>
    <div class="scroll-x"><table>
      <thead><tr><th>Mês</th><th class="num">Estoque inicial</th><th class="num">Compras</th><th class="num">Estoque final</th><th class="num">Vendas</th><th class="num">CMV</th></tr></thead>
      <tbody>${meses.map(m=>`<tr><td><b>${m.label}</b> <span style="color:var(--soft);font-size:12px">(${m.n})</span></td><td class="num">${fmtBRL(m.ei)}</td><td class="num">${fmtBRL(m.co)}</td><td class="num">${fmtBRL(m.ef)}</td><td class="num">${fmtBRL(m.ve)}</td><td class="num"><span class="tag ${cmvCls(m.cls)}">${fmtPct(m.pct)}</span></td></tr>`).join('')}</tbody>
    </table></div></div>`:''}`;
}
function editCmvReg(id,prefill){
  const last=(DB.cmvRegistros||[]).slice().sort((a,b)=>(b.data||'').localeCompare(a.data||''))[0];
  const estTot=Math.round(estoqueValorTotal()*100)/100;
  const hoje=new Date().toISOString().slice(0,10);
  const r=id?(DB.cmvRegistros||[]).find(x=>x.id===id):Object.assign({data:hoje,ei:(last?last.ef:''),compras:'',ef:'',vendas:''},prefill||{});
  modal(`<div class="modal-head"><h3>${id?'Editar contagem':'Nova contagem de CMV'}</h3><button class="x" onclick="closeModal()">${icoX}</button></div>
  <div class="modal-body">
    <div class="field"><label>Data da contagem</label><input class="input" id="cr_data" type="date" value="${esc(r.data)}"></div>
    <div class="grid-2">
      <div class="field"><label>Estoque inicial <span class="hint">R$</span></label><input class="input" id="cr_ei" type="number" step="0.01" value="${r.ei}" oninput="updCmvPrev()">
        ${last&&!id?`<button type="button" onclick="document.getElementById('cr_ei').value=${(+last.ef||0)};updCmvPrev()" style="font-size:11px;color:var(--navy);margin-top:5px">↩ Usar estoque final anterior (${fmtBRL(+last.ef||0)})</button>`:''}</div>
      <div class="field"><label>Compras do período <span class="hint">R$</span></label><input class="input" id="cr_compras" type="number" step="0.01" value="${r.compras}" oninput="updCmvPrev()"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Estoque final <span class="hint">R$</span></label><input class="input" id="cr_ef" type="number" step="0.01" value="${r.ef}" oninput="updCmvPrev()">
        <button type="button" onclick="document.getElementById('cr_ef').value=${estTot};updCmvPrev()" style="font-size:11px;color:var(--navy);margin-top:5px">↓ Usar valor do estoque atual (${fmtBRL(estTot)})</button></div>
      <div class="field"><label>Vendas do período <span class="hint">R$</span></label><input class="input" id="cr_vendas" type="number" step="0.01" value="${r.vendas}" oninput="updCmvPrev()"></div>
    </div>
    <div id="cr_calc"></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCmvReg('${id||''}')">Salvar</button></div>`);
  updCmvPrev();
}
function updCmvPrev(){const el=$('#cr_calc');if(!el)return;
  const ei=parseFloat($('#cr_ei').value)||0,co=parseFloat($('#cr_compras').value)||0,ef=parseFloat($('#cr_ef').value)||0,ve=parseFloat($('#cr_vendas').value)||0;
  const cmvRS=ei+co-ef, pct=ve?cmvRS/ve*100:0, cls=pct<28?'Excelente':pct<=35?'Aceitável':'Crítico';
  const cc=cls==='Excelente'?'#9ee5c2':cls==='Aceitável'?'#f0cd8a':'#f3a39c';
  el.innerHTML=`<div class="calc-box">
    <div class="line"><span>CMV (R$) = EI + Compras − EF</span><b>${fmtBRL(cmvRS)}</b></div>
    <div class="line big"><span>CMV %</span><b style="color:${cc}">${fmtPct(pct)}</b></div>
    <div class="line"><span>Classificação</span><b style="color:${cc}">${cls}</b></div>
  </div>`;}
function saveCmvReg(id){const data=$('#cr_data').value;if(!data)return toast('Informe a data da contagem');
  const obj={id:id||uid(),data,ei:parseFloat($('#cr_ei').value)||0,compras:parseFloat($('#cr_compras').value)||0,ef:parseFloat($('#cr_ef').value)||0,vendas:parseFloat($('#cr_vendas').value)||0};
  DB.cmvRegistros=DB.cmvRegistros||[];const i=DB.cmvRegistros.findIndex(x=>x.id===obj.id);
  if(i>=0)DB.cmvRegistros[i]=obj;else DB.cmvRegistros.push(obj);
  save();closeModal();viewCMV();toast(id?'Contagem atualizada':'Contagem registrada');}
function delCmvReg(id){if(!confirm('Remover esta contagem?'))return;DB.cmvRegistros=(DB.cmvRegistros||[]).filter(x=>x.id!==id);save();viewCMV();toast('Contagem removida');}

/* ===================== ESTOQUE & COMPRAS ===================== */
let estoqueTab='contagem', estoqueFiltro='Todos';
function custoUnitCompra(ins){return ins.qtd?ins.preco/ins.qtd:0;} // custo por unidade de compra
function estoqueItens(){
  return Object.values(DB.insumos).filter(i=>i.tipo!=='preparado').map(i=>{
    const custo=custoUnitCompra(i);
    const min=+i.estoqueMin||0, atual=+i.estoqueAtual||0;
    const necessidade=Math.max(0,min-atual);
    const valorEstoque=custo*atual;
    const qtdPedir=(i.qtdPedir!=null&&i.qtdPedir!=='')?(+i.qtdPedir||0):necessidade;
    const totalPrevisto=custo*qtdPedir;
    const comprar=atual<min;
    return {ins:i,nome:i.nome,cat:i.cat,uni:i.uni,fornecedor:i.fornecedor||'Sem fornecedor',custo,min,atual,necessidade,valorEstoque,qtdPedir,totalPrevisto,comprar};
  });
}
function estoqueValorTotal(){return estoqueItens().reduce((s,x)=>s+x.valorEstoque,0);}
function lancarCmvDoEstoque(){const v=Math.round(estoqueValorTotal()*100)/100;editCmvReg(null,{ef:v});toast('Estoque atual ('+fmtBRL(v)+') lançado como estoque final — informe compras e vendas');}
function viewEstoque(){
  const items=estoqueItens();
  const valorTotal=items.reduce((s,x)=>s+x.valorEstoque,0);
  const comprarList=items.filter(x=>x.comprar);
  const totalCompras=comprarList.reduce((s,x)=>s+x.totalPrevisto,0);
  $('#topActions').innerHTML = estoqueTab==='compras'
    ? `<button class="btn btn-gold no-print" onclick="window.print()">🖨️ Imprimir lista</button>`
    : `<button class="btn btn-ghost no-print" onclick="lancarCmvDoEstoque()">↗ Registrar no CMV</button>`;

  if(estoqueTab==='contagem'){
    const cats=['Todos',...new Set(items.map(x=>x.cat))];
    if(!cats.includes(estoqueFiltro))estoqueFiltro='Todos';
    const filt=estoqueFiltro==='Todos'?items:items.filter(x=>x.cat===estoqueFiltro);
    $('#view').innerHTML=`
    <div class="pill-filter no-print" style="margin-bottom:16px">
      <button class="${estoqueTab==='contagem'?'on':''}" onclick="estoqueTab='contagem';viewEstoque()">Contagem de Estoque</button>
      <button class="${estoqueTab==='compras'?'on':''}" onclick="estoqueTab='compras';viewEstoque()">Lista de Compras</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="ic ic-navy">${ico('cash')}</div><div class="k-lbl">Valor em estoque</div><div class="k-val">${fmtBRL(valorTotal)}</div><div class="k-sub" style="color:var(--soft)">${items.length} insumos</div></div>
      <div class="kpi"><div class="ic ${comprarList.length?'ic-red':'ic-green'}">${ico('cmv')}</div><div class="k-lbl">Itens a comprar</div><div class="k-val" style="color:${comprarList.length?'var(--red)':'var(--green)'}">${comprarList.length}</div><div class="k-sub" style="color:var(--soft)">abaixo do mínimo</div></div>
      <div class="kpi"><div class="ic ic-gold">${ico('mc')}</div><div class="k-lbl">Compra prevista</div><div class="k-val">${fmtBRL(totalCompras)}</div><div class="k-sub" style="color:var(--soft)">para repor o mínimo</div></div>
      <div class="kpi"><div class="ic ic-navy">${ico('profit')}</div><div class="k-lbl">Cobertura</div><div class="k-val">${items.length?fmtPct(items.filter(x=>!x.comprar).length/items.length*100):'—'}</div><div class="k-sub" style="color:var(--soft)">itens no nível</div></div>
    </div>
    <div class="section-head no-print"><div class="pill-filter">${cats.map(c=>`<button class="${c===estoqueFiltro?'on':''}" onclick="estoqueFiltro='${c.replace(/'/g,"\\'")}';viewEstoque()">${c}</button>`).join('')}</div></div>
    <div class="card"><div class="scroll-x"><table>
      <thead><tr><th>Insumo</th><th>Fornecedor</th><th class="num">Custo un.</th><th class="num">Mínimo</th><th class="num">Atual</th><th class="num">Necessid.</th><th class="num">Valor estoque</th><th class="num">Status</th></tr></thead>
      <tbody>${filt.sort((a,b)=>(b.comprar-a.comprar)||a.nome.localeCompare(b.nome)).map(x=>`
        <tr>
          <td><b>${x.nome}</b><div style="font-size:12px;color:var(--soft)">${x.cat} · ${x.uni}</div></td>
          <td><input class="input" style="min-width:130px" value="${esc(x.ins.fornecedor)}" placeholder="Fornecedor" oninput="DB.insumos['${x.ins.id}'].fornecedor=this.value;finTouch()"></td>
          <td class="num">${fmtBRL(x.custo)}</td>
          <td class="num"><input class="input" type="number" step="0.01" style="width:74px;text-align:right" value="${x.min}" oninput="DB.insumos['${x.ins.id}'].estoqueMin=parseFloat(this.value)||0;finTouch()" onchange="viewEstoque()"></td>
          <td class="num"><input class="input" type="number" step="0.01" style="width:74px;text-align:right" value="${x.atual}" oninput="DB.insumos['${x.ins.id}'].estoqueAtual=parseFloat(this.value)||0;finTouch()" onchange="viewEstoque()"></td>
          <td class="num">${x.necessidade?fmtN(x.necessidade,x.necessidade%1?2:0)+' '+x.uni:'—'}</td>
          <td class="num">${fmtBRL(x.valorEstoque)}</td>
          <td class="num"><span class="tag ${x.comprar?'tag-red':'tag-green'}">${x.comprar?'COMPRAR':'OK'}</span></td>
        </tr>`).join('')}</tbody>
      <tfoot><tr style="border-top:2px solid var(--navy);font-weight:700"><td colspan="6" style="padding:12px 13px">Valor total em estoque</td><td class="num" style="padding:12px 13px">${fmtBRL(valorTotal)}</td><td></td></tr></tfoot>
    </table></div></div>`;
    return;
  }

  // ===== LISTA DE COMPRAS =====
  const byForn={};comprarList.forEach(x=>{(byForn[x.fornecedor]=byForn[x.fornecedor]||[]).push(x);});
  const forns=Object.keys(byForn).sort();
  const hoje=new Date().toLocaleDateString('pt-BR');
  $('#view').innerHTML=`
  <div class="pill-filter no-print" style="margin-bottom:16px">
    <button onclick="estoqueTab='contagem';viewEstoque()">Contagem de Estoque</button>
    <button class="on" onclick="estoqueTab='compras';viewEstoque()">Lista de Compras</button>
  </div>
  <div class="print-only" style="margin-bottom:14px">
    <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:700">Lista de Compras</div>
    <div style="font-size:13px;color:#555">${(DB.conta&&DB.conta.restaurante)||'Restaurante'} · ${hoje}</div>
  </div>
  ${comprarList.length===0?`<div class="card">${emptyState('Nada a comprar','Todos os insumos estão no nível mínimo ou acima. Faça a contagem para atualizar.','estoqueTab=&#39;contagem&#39;;viewEstoque()')}</div>`:`
  <div class="card card-pad no-print" style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <div><div class="ttl">${comprarList.length} item(ns) para comprar</div><div class="desc">Agrupados por fornecedor · ajuste a "Qtd a pedir" se quiser comprar em embalagem/múltiplo</div></div>
    <div style="font-size:20px;font-weight:700;font-family:'Fraunces',serif">Total: ${fmtBRL(totalCompras)}</div>
  </div>
  ${forns.map(fn=>{const arr=byForn[fn];const sub=arr.reduce((s,x)=>s+x.totalPrevisto,0);return`
    <div class="card" style="margin-bottom:16px">
      <div class="card-pad" style="padding-bottom:8px;display:flex;justify-content:space-between;align-items:center"><div class="ttl">🚚 ${fn}</div><div style="font-weight:700">${fmtBRL(sub)}</div></div>
      <div class="scroll-x"><table>
        <thead><tr><th>Insumo</th><th class="num">Un.</th><th class="num">Mínimo</th><th class="num">Atual</th><th class="num">Necessid.</th><th class="num">Qtd a pedir</th><th class="num">Custo un.</th><th class="num">Total previsto</th></tr></thead>
        <tbody>${arr.sort((a,b)=>a.nome.localeCompare(b.nome)).map(x=>`
          <tr>
            <td><b>${x.nome}</b></td><td class="num">${x.uni}</td><td class="num">${fmtN(x.min,x.min%1?2:0)}</td><td class="num">${fmtN(x.atual,x.atual%1?2:0)}</td>
            <td class="num">${fmtN(x.necessidade,x.necessidade%1?2:0)}</td>
            <td class="num"><input class="input no-print" type="number" step="0.01" style="width:78px;text-align:right" value="${x.qtdPedir}" oninput="DB.insumos['${x.ins.id}'].qtdPedir=this.value;finTouch()" onchange="viewEstoque()"><span class="print-only">${fmtN(x.qtdPedir,x.qtdPedir%1?2:0)}</span></td>
            <td class="num">${fmtBRL(x.custo)}</td><td class="num"><b>${fmtBRL(x.totalPrevisto)}</b></td>
          </tr>`).join('')}</tbody>
      </table></div>
    </div>`;}).join('')}
  <div class="card card-pad" style="display:flex;justify-content:space-between;align-items:center"><div class="ttl">Total geral da compra</div><div style="font-size:22px;font-weight:700;font-family:'Fraunces',serif;color:var(--navy)">${fmtBRL(totalCompras)}</div></div>`}`;
}

/* ===================== HELPERS ===================== */
function emptyState(t,d,action){return `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg><div class="t">${t}</div><div class="d">${d}</div><button class="btn btn-primary" style="margin-top:16px" onclick="${action}">${icoPlus} Começar</button></div>`;}

renderFoot();go('dashboard');
</script>
</body>
</html>
