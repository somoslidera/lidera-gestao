function parseDataISO(v){if(v==null||v==='')return '';
  if(v instanceof Date&&!isNaN(v))return v.getUTCFullYear()+'-'+String(v.getUTCMonth()+1).padStart(2,'0')+'-'+String(v.getUTCDate()).padStart(2,'0');
  if(typeof v==='number'){const d=new Date(Date.UTC(1899,11,30)+Math.round(v)*86400000);return d.toISOString().slice(0,10);}
  const s=v.toString().trim();let m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);if(m){let y=m[3];if(y.length===2)y='20'+y;return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;}
  return '';}
function mesNum(v){if(v==null||v==='')return 0;const s=v.toString().trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');const n=parseInt(s,10);if(n>=1&&n<=12)return n;
  const nm=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];const i=nm.findIndex(x=>x.slice(0,3)===s.slice(0,3));return i>=0?i+1:0;}

function normHdr(s){return (s==null?'':s).toString().trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function colIdx(header,cands){for(let i=0;i<header.length;i++){const h=normHdr(header[i]);if(cands.some(c=>h===c||h.includes(c)))return i;}return -1;}
async function importarLancamentos(input){const f=input&&input.files&&input.files[0];if(input)input.value='';if(!f)return;
  let rows;try{if(/\.xlsx?$/i.test(f.name)){const X=await loadXLSX();const wb=X.read(new Uint8Array(await f.arrayBuffer()),{type:'array',cellDates:true});rows=X.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});}else rows=parseCSV(await f.text());}catch(e){return toast('Não foi possível ler o arquivo. Use o modelo em “Modelo”.');}
  rows=(rows||[]).filter(r=>Array.isArray(r)&&r.some(c=>(c==null?'':c).toString().trim()!==''));
  if(!rows.length)return toast('Planilha vazia');
  // mapeia colunas pelo cabeçalho (aceita qualquer ordem); senão usa posição padrão
  const header=rows[0]||[];const temHdr=/data|grupo|valor|descri|forma|subcateg|categoria/.test(normHdr(header.join(' ')));
  let M;
  if(temHdr){M={data:colIdx(header,['data']),ano:colIdx(header,['ano']),mes:colIdx(header,['mes']),dia:colIdx(header,['dia']),grupo:colIdx(header,['grupo']),sub:colIdx(header,['subcategoria','subcateg']),desc:colIdx(header,['descricao','descri','historico','observ']),valor:colIdx(header,['valor','total']),forma:colIdx(header,['forma','pagamento','meio'])};
    if(M.sub<0)M.sub=colIdx(header,['categoria']);}
  else M={data:0,ano:-1,mes:-1,dia:-1,grupo:1,sub:2,desc:3,valor:4,forma:5};
  if(M.grupo<0)M.grupo=1;if(M.valor<0)M.valor=4;
  const cell=(row,i)=>i>=0&&row[i]!=null?row[i].toString().trim():'';
  DB.lancamentos=DB.lancamentos||[];DB.categorias=DB.categorias||{};DB.formasPagamento=DB.formasPagamento||[];
  let add=0,novos=0,ult='';
  for(let r=temHdr?1:0;r<rows.length;r++){const row=rows[r]||[];
    const grupo=cell(row,M.grupo),sub=cell(row,M.sub),desc=cell(row,M.desc),forma=cell(row,M.forma);

    if(!data&&M.dia>=0&&M.mes>=0){const ano=parseInt(cell(row,M.ano),10)||(new Date().getFullYear()),mm=mesNum(row[M.mes]),dd=parseInt(cell(row,M.dia),10);if(mm&&dd)data=ano+'-'+String(mm).padStart(2,'0')+'-'+String(dd).padStart(2,'0');}
    const val=parseNumBR(M.valor>=0?row[M.valor]:'');
    if(!data||!grupo||!val)continue;
    if(!DB.categorias[grupo]){DB.categorias[grupo]={tipo:val>=0?'receita':'despesa',subs:sub?[sub]:[]};novos++;}
    else if(sub&&!DB.categorias[grupo].subs.includes(sub))DB.categorias[grupo].subs.push(sub);
    if(forma&&!DB.formasPagamento.includes(forma))DB.formasPagamento.push(forma);
    DB.lancamentos.push({id:uid(),data,grupo,sub,descricao:desc,valor:Math.abs(val),forma,importado:true});add++;ult=ymOf(data);
  }
  if(!add)return toast('Nenhuma linha válida (confira Data, Grupo e Valor)');
  if(ult)lancYM=ult;
  const ok=await saveNow();viewFinanceiro();
  toast(ok?`${add} lançamento(s) importado(s)`+(novos?` · ${novos} grupo(s) novo(s)`:''):'Importado, mas houve falha ao salvar. Verifique a conexão e importe novamente.');
}

function syncContaLanc(key,conta){

  DB.lancamentos=(DB.lancamentos||[]).filter(l=>l.fromConta!==conta.id);

      grupo:conta.grupo||(key==='contasPagar'?'Despesas Gerais':'Receita'),sub:conta.sub||'',

function pad2(n){return String(n).padStart(2,'0');}
function gerarRecorrentesMes(ym){
  if(!ym)return false;DB.fin.contasPagar=DB.fin.contasPagar||[];DB.fin.recGerados=DB.fin.recGerados||{};
  const last=new Date(+ym.slice(0,4),+ym.slice(5,7),0).getDate();
  let novo=false;
  const add=(src,nome,grupo,sub,dia,valor)=>{const k=src+'|'+ym;if(DB.fin.recGerados[k])return;
    DB.fin.contasPagar.push({id:uid(),descricao:nome,grupo,sub,vencimento:ym+'-'+pad2(Math.min(last,Math.max(1,dia||5))),valor:valor||0,pago:false,fromRec:src,mesRef:ym});
    DB.fin.recGerados[k]=true;novo=true;};
  (DB.fin.custosFixos||[]).forEach(c=>{if(c.diaVenc>0)add('cf_'+c.id,c.nome||'Custo fixo',c.grupo||'Despesas Gerais',c.sub||'',c.diaVenc,c.valor);});
  (DB.fin.funcionarios||[]).forEach(f=>{if(f.diaVenc>0&&(f.salario||0)>0)add('fn_'+f.id,(f.nome||'Funcionário')+' · salário','Mão-de-Obra','Salários',f.diaVenc,f.salario);});

  return novo;
}

function finVisao(t){
  const saldoConta=(DB.fin.contasBancarias||[]).reduce((s,x)=>s+(x.saldo||0),0);

const ACESSOS=[['dashboard','Dashboard'],['insumos','Insumos'],['fichas','Fichas Técnicas'],['estoque','Estoque & Compras'],['engenharia','Engenharia de Menu'],['cmv','Controle de CMV'],['desperdicio','Desperdícios'],['buffet','Mapa do Buffet'],['faturamento','Faturamento'],['dre','DRE'],['financeiro','Financeiro'],['mapa','Mapa do Caminho'],['equipe','Equipe'],['conta','Configurações']];
const NIVEIS={
  admin:{label:'Administrador',desc:'Acesso total a tudo',perms:ACESSOS.map(a=>a[0])},
  gerente:{label:'Gerente',desc:'Operação + indicadores (sem equipe/config)',perms:['dashboard','insumos','fichas','estoque','engenharia','cmv','desperdicio','buffet','faturamento','dre','mapa']},
  operador:{label:'Operador',desc:'Só operação do dia a dia',perms:['insumos','fichas','estoque','cmv','desperdicio','buffet']},
  personalizado:{label:'Personalizado',desc:'Você escolhe cada acesso',perms:[]}
};
function normMembro(m){if(!m.nivel)m.nivel='gerente';if(!Array.isArray(m.permissoes))m.permissoes=(NIVEIS[m.nivel]||NIVEIS.gerente).perms.slice();return m;}
function viewEquipe(){
  DB.equipe=(DB.equipe||[]).map(normMembro);
  $('#topActions').innerHTML=`<button class="btn btn-primary" onclick="addMembro()">${icoPlus} Adicionar membro</button>`;
  const arr=DB.equipe;
  $('#view').innerHTML=`<div class="card card-pad" style="max-width:920px">
    <div class="section-head"><div><div class="ttl">Membros da equipe</div><div class="desc">Crie acessos para a equipe e escolha o nível de acesso de cada um. Sem limite de membros.</div></div></div>
    ${arr.length?`<div class="scroll-x"><table>
      <thead><tr><th>Nome</th><th>E-mail de login</th><th>Nível de acesso</th><th class="num">Áreas</th><th></th></tr></thead>
      <tbody>${arr.map((m,i)=>`<tr>
        <td><b>${esc(m.nome)||'<span style="color:var(--soft)">Sem nome</span>'}</b></td>
        <td>${esc(m.email)||'<span style="color:var(--soft)">—</span>'}</td>
        <td><span class="tag ${m.nivel==='admin'?'tag-navy':m.nivel==='personalizado'?'tag-gold':'tag-gray'}">${NIVEIS[m.nivel].label}</span></td>
        <td class="num">${m.nivel==='admin'?'Todas':m.permissoes.length+' de '+ACESSOS.length}</td>
        <td><div class="row-actions"><button class="icon-btn" onclick="editMembro('${m.id}')">${icoEdit}</button><button class="icon-btn del" onclick="removerMembro('${m.id}')">${icoTrash}</button></div></td></tr>`).join('')}</tbody></table></div>`
    :emptyState('Nenhum membro cadastrado','Crie acessos para sua equipe operar o sistema.','addMembro()')}
    <div style="border-top:1px solid var(--line);margin-top:14px;padding-top:12px;font-size:12.5px;color:var(--muted)">${arr.length} membro(s) · o nível define quais áreas cada um acessa.</div>
  </div>`;
}
function addMembro(){const m={id:uid(),nome:'',email:'',senha:'',nivel:'gerente',permissoes:NIVEIS.gerente.perms.slice()};DB.equipe=DB.equipe||[];DB.equipe.push(m);save();editMembro(m.id);}
let editMembroId=null;
function editMembro(id){editMembroId=id;const m=normMembro(DB.equipe.find(x=>x.id===id));if(!m)return;
  modal(`<div class="modal-head"><h3>Membro da equipe</h3><button class="x" onclick="closeModal()">${icoX}</button></div>
  <div class="modal-body">
    <div class="grid-2">
      <div class="field"><label>Nome</label><input class="input" id="mb_nome" value="${esc(m.nome)}" placeholder="Nome do membro"></div>
      <div class="field"><label>E-mail de login</label><input class="input" id="mb_email" type="email" value="${esc(m.email)}" placeholder="membro@restaurante.com"></div>
    </div>
    <div class="field"><label>Senha provisória</label><input class="input" id="mb_senha" value="${esc(m.senha)}" placeholder="defina uma senha"></div>
    <div class="field"><label>Nível de acesso</label>
      <select class="input" id="mb_nivel" onchange="membroSetNivel(this.value)">${Object.entries(NIVEIS).map(([k,v])=>`<option value="${k}" ${m.nivel===k?'selected':''}>${v.label} — ${v.desc}</option>`).join('')}</select></div>
    <div style="font-size:12px;font-weight:600;color:var(--muted);margin:6px 0 8px">Áreas que este membro pode acessar</div>
    <div id="mb_perms" style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px">${ACESSOS.map(([k,l])=>`<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" data-perm="${k}" ${m.permissoes.includes(k)?'checked':''} onchange="membroTogglePerm()" style="width:16px;height:16px;accent-color:var(--navy)"> ${l}</label>`).join('')}</div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveMembro()">Salvar membro</button></div>`);
}
function membroSetNivel(nivel){const checks=document.querySelectorAll('#mb_perms input[data-perm]');const perms=(NIVEIS[nivel]||{perms:[]}).perms;
  if(nivel!=='personalizado')checks.forEach(c=>c.checked=perms.includes(c.dataset.perm));}
function membroTogglePerm(){const sel=document.getElementById('mb_nivel');if(sel)sel.value='personalizado';}
async function saveMembro(){const m=DB.equipe.find(x=>x.id===editMembroId);if(!m)return;
  const nome=$('#mb_nome').value.trim(),email=$('#mb_email').value.trim().toLowerCase(),senha=$('#mb_senha').value;
  m.nome=nome;m.email=email;m.senha=senha;m.nivel=$('#mb_nivel').value;
  m.permissoes=[...document.querySelectorAll('#mb_perms input[data-perm]:checked')].map(c=>c.dataset.perm);
  if(m.nivel==='admin')m.permissoes=NIVEIS.admin.perms.slice();
  const btn=document.querySelector('.modal-foot .btn-primary');
  // cria a conta de login real na 1ª vez (precisa estar na nuvem)
  if(sb&&CLOUD&&!m.authId){
    if(!email||senha.length<6){return toast('Informe e-mail e senha de ao menos 6 caracteres para criar o acesso');}
    if(btn){btn.disabled=true;btn.textContent='Criando acesso...';}
    let res;try{res=await chamarFn('criar-membro',{acao:'criar',email,senha,nome,orgId:(ORG&&ORG.id)});}catch(e){res={data:{error:e.message}};}
    if(btn){btn.disabled=false;btn.textContent='Salvar membro';}
    if(!res.data||!res.data.ok)return toast(res.data&&res.data.error||'Não foi possível criar o acesso');
    m.authId=res.data.authId;m.criado=true;
    save();closeModal();viewEquipe();toast('Acesso criado! O membro já entra com o e-mail e a senha.');return;
  }
  save();closeModal();viewEquipe();toast('Membro atualizado');}
async function removerMembro(id){const m=DB.equipe.find(x=>x.id===id);if(!m)return;
  if(!confirm('Remover este membro? O acesso dele será desativado.'))return;
  if(sb&&CLOUD&&m.authId){try{await chamarFn('criar-membro',{acao:'remover',authId:m.authId,orgId:(ORG&&ORG.id)});}catch(e){}}
  DB.equipe=DB.equipe.filter(x=>x.id!==id);save();viewEquipe();toast('Membro removido');}

function ringSVG(pct){const r=34,c=2*Math.PI*r,off=c*(1-clamp(pct,0,100)/100);
  return `<svg width="92" height="92" viewBox="0 0 92 92"><circle cx="46" cy="46" r="34" fill="none" stroke="var(--line)" stroke-width="9"/><circle cx="46" cy="46" r="34" fill="none" stroke="var(--green)" stroke-width="9" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 46 46)"/></svg>`;}
function viewMapa(){
  const nIns=Object.keys(DB.insumos).length, nFic=Object.keys(DB.fichas).length;
  const steps=[
    {nome:'Onboarding',desc:'Cadastro inicial do restaurante',done:!!(DB.conta&&DB.conta.restaurante),route:'conta'},
    {nome:'Insumos',desc:`${nIns} insumo(s) cadastrado(s)`,done:nIns>0,route:'insumos'},
    {nome:'Fichas Técnicas',desc:`${nFic} ficha(s) com custo`,done:nFic>0,route:'fichas'},
    {nome:'Engenharia de Menu',desc:'Matriz com preço e vendas',done:fichasVendaveis().some(f=>f.precoVenda>0&&f.vendasMes>0),route:'engenharia'},
    {nome:'Equipe',desc:`${(DB.fin.socios||[]).length} sócio(s) · ${(DB.fin.funcionarios||[]).length} funcionário(s)`,done:(DB.fin.socios||[]).length>0&&(DB.fin.funcionarios||[]).length>0,route:'financeiro'},
    {nome:'Financeiro',desc:'Gestão financeira ativa',done:(DB.fin.contasPagar||[]).length>0,route:'financeiro'},
  ];
  const done=steps.filter(s=>s.done).length, pct=Math.round(done/steps.length*100);
  $('#view').innerHTML=`<div class="card card-pad" style="max-width:760px">
    <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px">
      <div style="position:relative;flex-shrink:0">${ringSVG(pct)}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Fraunces',serif;font-size:19px">${pct}%</div></div>
      <div><div class="ttl" style="font-size:18px">Mapa do Caminho</div><div class="desc">${done} de ${steps.length} etapas concluídas — siga para destravar todo o potencial do app.</div></div>
    </div>
    ${steps.map(s=>`<div style="display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px">
      <div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;${s.done?'background:var(--green);color:#fff':'background:#EEF0F4;color:var(--soft)'}">${s.done?'✓':'○'}</div>
      <div style="flex:1"><div style="font-weight:600;font-size:14px">${s.nome} ${s.done?'<span class="tag tag-green" style="margin-left:6px">Concluído</span>':'<span class="tag tag-gray" style="margin-left:6px">Pendente</span>'}</div><div style="font-size:12px;color:var(--muted)">${s.desc}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="go('${s.route}')">Abrir</button>
    </div>`).join('')}
  </div>`;
}

const CMV_ALVO_BUFFET=0.30, REGRA_8020=0.80;

function buffetData(){
  const b=DB.buffet||(DB.buffet={precoVendaKg:'',cubas:[]});
  const precoKg=parseFloat(b.precoVendaKg)||0;
  const cubas=(b.cubas||[]).map(c=>{
    const ficha=DB.fichas[c.fichaId];
    const ckg=ficha?custoPorKgFicha(ficha):0;
    const peso=parseFloat(c.pesoKg)||0;
    const custo=ckg*peso, receita=precoKg*peso, cmv=precoKg>0?ckg/precoKg:0;
    return {...c,ficha,ckg,peso,custo,receita,cmv,ok:precoKg>0&&cmv<=CMV_ALVO_BUFFET};
  });
  const comF=cubas.filter(c=>c.ficha);
  const totalCusto=comF.reduce((s,c)=>s+c.custo,0), totalReceita=comF.reduce((s,c)=>s+c.receita,0), totalPeso=comF.reduce((s,c)=>s+c.peso,0);
  const cmvBuffet=totalReceita>0?totalCusto/totalReceita:0;
  const dentro=comF.filter(c=>c.ok).length, perc=comF.length?dentro/comF.length:0;
  return {b,precoKg,cubas,comF,totalCusto,totalReceita,totalPeso,cmvBuffet,dentro,perc,conforme:perc>=REGRA_8020};
}

function buffetAddCuba(){const n=(DB.buffet.cubas||[]).length;DB.buffet.cubas=DB.buffet.cubas||[];
  DB.buffet.cubas.push({id:uid(),fichaId:'',pesoKg:'3',rot:0,x:24+(n%8)*26,y:46+(n%8)*26,w:104,h:74});

function buffetUpdCuba(id,patch){const c=(DB.buffet.cubas||[]).find(x=>x.id===id);if(c)Object.assign(c,patch);save();}
function buffetDelCuba(id){DB.buffet.cubas=(DB.buffet.cubas||[]).filter(x=>x.id!==id);if(buffetSel===id)buffetSel=null;save();viewBuffet();}
function buffetRot(id){const c=(DB.buffet.cubas||[]).find(x=>x.id===id);if(c){c.rot=((c.rot||0)+90)%360;save();viewBuffet();}}
function buffetDeselect(e){if(e.target&&e.target.id==='buffetBoard'){buffetSel=null;viewBuffet();}}
function buffetCubaDown(e,id,mode){
  e.stopPropagation();e.preventDefault();buffetSel=id;
  const c=(DB.buffet.cubas||[]).find(x=>x.id===id);if(!c)return;
  const board=document.getElementById('buffetBoard');const br=board.getBoundingClientRect();
  buffetDrag={id,mode,sx:e.clientX,sy:e.clientY,ox:c.x,oy:c.y,ow:c.w,oh:c.h,bw:br.width,bh:br.height};
  window.addEventListener('pointermove',buffetCubaMove);window.addEventListener('pointerup',buffetCubaUp);
}
function buffetCubaMove(e){const d=buffetDrag;if(!d)return;const el=document.getElementById('cuba_'+d.id);if(!el)return;
  const dx=e.clientX-d.sx,dy=e.clientY-d.sy;
  if(d.mode==='move'){const x=Math.max(0,Math.min(d.bw-d.ow,d.ox+dx)),y=Math.max(0,Math.min(d.bh-d.oh,d.oy+dy));el.style.left=Math.round(x)+'px';el.style.top=Math.round(y)+'px';d.nx=Math.round(x);d.ny=Math.round(y);}
  else{const w=Math.max(44,Math.min(d.bw-d.ox,d.ow+dx)),h=Math.max(34,Math.min(d.bh-d.oy,d.oh+dy));el.style.width=Math.round(w)+'px';el.style.height=Math.round(h)+'px';d.nw=Math.round(w);d.nh=Math.round(h);}
}
function buffetCubaUp(){const d=buffetDrag;window.removeEventListener('pointermove',buffetCubaMove);window.removeEventListener('pointerup',buffetCubaUp);buffetDrag=null;if(!d)return;
  const c=(DB.buffet.cubas||[]).find(x=>x.id===d.id);if(c){if(d.mode==='move'&&d.nx!=null){c.x=d.nx;c.y=d.ny;}if(d.mode==='resize'&&d.nw!=null){c.w=d.nw;c.h=d.nh;}}
  save();viewBuffet();
}

/* ===================== CONTROLE DE CMV (Real por contagem) ===================== */
const MESES_PT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function semanaISO(iso){const p=(iso||'').split('-');if(p.length<3)return'';const dt=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day+3);const ft=new Date(Date.UTC(dt.getUTCFullYear(),0,4));const fd=(ft.getUTCDay()+6)%7;ft.setUTCDate(ft.getUTCDate()-fd+3);return 1+Math.round((dt-ft)/(7*24*3600*1000));}
function fmtDataBR(iso){const p=(iso||'').split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:'—';}
function cmvRegCalc(r){const ei=+r.ei||0,co=+r.compras||0,ef=+r.ef||0,ve=+r.vendas||0;const cmvRS=ei+co-ef;const pct=ve?cmvRS/ve*100:0;const cls=pct<=cmvAlvoRef()?'Excelente':pct<=cmvUpRef()?'Aceitável':'Crítico';return {...r,ei,co,ef,ve,cmvRS,pct,cls};}
function cmvCls(cls){return cls==='Excelente'?'tag-green':cls==='Aceitável'?'tag-amber':'tag-red';}
function cmvClsCor(cls){return cls==='Excelente'?'var(--green)':cls==='Aceitável'?'var(--amber)':'var(--red)';}

/* ===================== CONTROLE DE DESPERDÍCIOS ===================== */
const DESP_MOTIVOS=['Validade / vencimento','Deterioração','Queima / cozimento','Quebra / acidente','Sobra de produção','Erro de preparo','Devolução de cliente','Outros'];
let despYM=null, draftDesp=[], despSel=null;
function despCurYM(){return despYM||ymOf(hojeISO());}
function fichaDom(f){let g=0,ml=0,un=0;(f.comps||[]).forEach(([id,q])=>{const ins=DB.insumos[id];if(!ins)return;const b=BASE[ins.uni];if(b==='g')g+=q||0;else if(b==='ml')ml+=q||0;else un+=(q||0);});return (ml>g&&ml>=un)?'ml':(un>g&&un>ml)?'un':'g';}
function despUnitItem(tipo,id){
  if(tipo==='ficha'){const f=DB.fichas[id];if(!f)return {sym:'gr',custo:0};
    const dom=fichaDom(f);
    if(dom==='un')return {sym:'un',custo:custoProduto(f)};                 // ficha contada por unidade
    return {sym:dom==='ml'?'ml':'gr',custo:custoPorKgFicha(f)/1000};       // por grama / mililitro
  }
  const i=DB.insumos[id];if(!i)return {sym:'—',custo:0};return {sym:uSym(i.uni),custo:custoInsumoBase(i)*(TO_BASE[i.uni]||1)};}
function despItensFlat(){const arr=[];
  Object.values(DB.insumos||{}).forEach(i=>arr.push({tipo:'insumo',id:i.id,nome:i.nome+(i.tipo==='preparado'?' (preparado)':''),grupo:i.tipo==='preparado'?'Preparado':'Insumo'}));
  Object.values(DB.fichas||{}).forEach(f=>arr.push({tipo:'ficha',id:f.id,nome:f.nome,grupo:'Ficha'}));
  return arr.sort((a,b)=>a.nome.localeCompare(b.nome));}
function despNome(tipo,id){if(tipo==='ficha')return (DB.fichas[id]||{}).nome||'—';const i=DB.insumos[id]||{};return (i.nome||'—')+(i.tipo==='preparado'?' (preparado)':'');}

  if(!q){box.innerHTML='';return;}
  const ms=despItensFlat().filter(it=>it.nome.toLowerCase().includes(q)).slice(0,8);
  box.innerHTML=ms.length?`<div class="ins-results" style="position:absolute;left:0;right:0;top:100%;z-index:30;margin-top:4px">${ms.map(it=>`<div onclick="despPick('${it.tipo}','${it.id}')">${esc(it.nome)} <span style="float:right;color:var(--soft)">${it.grupo}</span></div>`).join('')}</div>`:`<div class="ins-results" style="position:absolute;left:0;right:0;top:100%;z-index:30;margin-top:4px"><div style="color:var(--soft)">Nada encontrado.</div></div>`;}

/* ===================== ESTOQUE & COMPRAS ===================== */
let estoqueTab='contagem', estoqueFiltro='Todos';
function custoUnitCompra(ins){return ins.qtd?ins.preco/ins.qtd:0;} // custo por unidade de compra
function estoqueItens(){
  return Object.values(DB.insumos).filter(i=>i.tipo!=='preparado'&&i.noEstoque!==false).map(i=>{
    const custo=custoUnitCompra(i);
    const min=+i.estoqueMin||0, atual=+i.estoqueAtual||0;
    const necessidade=Math.max(0,min-atual);
    const valorEstoque=custo*atual;
    const qtdPedir=(i.qtdPedir!=null&&i.qtdPedir!=='')?(+i.qtdPedir||0):necessidade;
    const totalPrevisto=custo*qtdPedir;
    const comprar=atual<min;
    return {ins:i,nome:i.nome,cat:i.cat,uni:i.uni,fornecedor:i.fornecedor||'Sem fornecedor',custo,min,atual,necessidade,valorEstoque,qtdPedir,totalPrevisto,comprar};
  });
}
function estoqueValorTotal(){return estoqueItens().reduce((s,x)=>s+x.valorEstoque,0);}
function lancarCmvDoEstoque(){const v=Math.round(estoqueValorTotal()*100)/100;editCmvReg(null,{ef:v});toast('Estoque atual ('+fmtBRL(v)+') lançado como estoque final — informe compras e vendas');}
function imprimirContagem(){
  const items=estoqueItens().slice().sort((a,b)=>(a.cat||'').localeCompare(b.cat||'')||a.nome.localeCompare(b.nome));
  if(!items.length)return toast('Nenhum insumo marcado para contagem');
  const rest=(DB.conta&&DB.conta.restaurante)||'Restaurante';
  let body='',lastCat=null;
  items.forEach(x=>{if(x.cat!==lastCat){lastCat=x.cat;body+=`<div class="cg">${esc(x.cat||'Sem categoria')}</div>`;}
    body+=`<div class="ci"><span class="ci-n">${esc(x.nome)}</span><span class="ci-u">${uSym(x.uni)}</span><span class="ci-b"></span></div>`;});
  let pa=document.getElementById('printArea');if(!pa){pa=document.createElement('div');pa.id='printArea';document.body.appendChild(pa);}
  pa.innerHTML=`<div class="ct-head">
      <div><div style="font-size:19px;font-weight:700">${esc(rest)}</div><div style="font-size:13px">Folha de Contagem de Estoque</div></div>
      <div style="font-size:11.5px;text-align:right;line-height:1.9">Data: ____/____/______<br>Responsável: __________________</div>
    </div>
    <div class="ct-note">Anote a quantidade contada de cada item. Depois, registre no app em <b>Estoque &gt; Atual</b>.</div>
    <div class="count-cols">${body}</div>`;
  document.body.classList.add('print-contagem');
  const fim=()=>{document.body.classList.remove('print-contagem');pa.innerHTML='';window.removeEventListener('afterprint',fim);};
  window.addEventListener('afterprint',fim);
  window.print();
  setTimeout(fim,1500);
}

async function bootApp(){

async function afterAuth(){
  hideLogin();
  let user;try{user=(await sb.auth.getUser()).data.user;}catch(e){showLogin();return;}
  const uid=user.id, email=(user.email||'').toLowerCase();
  let perfil=null;try{perfil=(await sb.from('perfis').select('*').eq('id',uid).single()).data;}catch(e){}
  PERFIL=perfil||{papel:'cliente',org_id:null};
  if(PERFIL.papel==='admin'){MEMBRO_PERMS=null;showAdmin();}
  else{await entrarComoCliente(PERFIL.org_id,email);}
}
async function entrarComoCliente(orgId,email){
  if(!orgId){telaMensagem('Conta sem restaurante vinculado','Sua conta foi criada, mas ainda não está liberada por um administrador. Aguarde a liberação.');return;}
  let org=null;try{org=(await sb.from('organizacoes').select('*').eq('id',orgId).single()).data;}catch(e){}
  if(!org){telaMensagem('Acesso indisponível','Não foi possível carregar seu restaurante. Tente novamente mais tarde.');return;}
  ORG=org;
  if(org.status==='suspenso'){telaMensagem('Acesso suspenso','Seu acesso está temporariamente suspenso. Fale com a Lidera para reativar.');return;}
  DB=(org.dados&&org.dados.insumos)?org.dados:emptyDB();
  CLOUD=true;ADMIN_MODE=false;hideAdmin();
  // É um MEMBRO da equipe (não o dono)? Aplica o nível de acesso.
  MEMBRO_PERMS=null;
  const membro=email?(DB.equipe||[]).find(x=>(x.email||'').toLowerCase()===email):null;
  if(membro){
    MEMBRO_PERMS=(membro.permissoes||[]).slice();
    if(!MEMBRO_PERMS.length){telaMensagem('Acesso não configurado','Seu acesso ainda não tem áreas liberadas. Fale com o responsável pela conta.');return;}
  }
  bannerCloud();renderFoot();
  if(MEMBRO_PERMS){aplicarAcessoMembro();go(MEMBRO_PERMS[0]);}
  else{go('dashboard');if(!DB.onboardingFeito)setTimeout(()=>abrirWizard(1),350);}
}

async function doLogin(){const email=$('#auth_email').value.trim(),pass=$('#auth_pass').value;if(!email||!pass)return authErr('Informe e-mail e senha.');

function secMsg(m,kind){const e=document.getElementById('sec_msg');if(!e)return;e.style.display='block';e.textContent=m;
  if(kind==='green'){e.style.background='var(--green-bg)';e.style.color='var(--green)';}else{e.style.background='var(--red-bg)';e.style.color='var(--red)';}}
async function trocarSenha(){
  if(!sb)return;
  const n1=$('#sec_p1').value, n2=$('#sec_p2').value;
  if(!n1||n1.length<6)return secMsg('A nova senha precisa de ao menos 6 caracteres.','red');
  if(n1!==n2)return secMsg('As senhas não coincidem.','red');
  const btn=event&&event.target;if(btn)btn.disabled=true;
  const {error}=await sb.auth.updateUser({password:n1});
  if(btn)btn.disabled=false;
  if(error)return secMsg(error.message||'Não foi possível atualizar a senha.','red');
  $('#sec_p1').value='';$('#sec_p2').value='';
  secMsg('Senha atualizada com sucesso! Use a nova senha no próximo acesso.','green');
}

function kpisDe(dados){return withDB((dados&&dados.insumos)?dados:emptyDB(),()=>{const t=totaisGerais();const regs=(DB.cmvRegistros||[]).map(cmvRegCalc).sort((a,b)=>(b.data||'').localeCompare(a.data||''));return {fat:t.faturamento,cmv:t.cmv,real:regs.length?regs[0].pct:null,lucro:t.lucro,nf:Object.keys(DB.fichas).length,ni:Object.keys(DB.insumos).length};});}

async function arquivarCliente(orgId,arq){
  try{const o=(await sb.from('organizacoes').select('dados').eq('id',orgId).single()).data;const dados=(o&&o.dados)||{};dados._arquivado=!!arq;
    await sb.from('organizacoes').update({dados}).eq('id',orgId);}catch(e){return toast('Erro ao '+(arq?'arquivar':'restaurar'));}
  toast(arq?'Cliente arquivado':'Cliente restaurado');showAdmin();}
async function excluirCliente(orgId,nome){
  if(!confirm('EXCLUIR definitivamente "'+nome+'"?\n\nIsso remove o restaurante, todos os dados e os acessos vinculados. NÃO pode ser desfeito.\n\nDica: se só quer parar de usar, use Arquivar.'))return;
  if(!confirm('Tem certeza? Esta ação é irreversível.'))return;
  try{const ps=(await sb.from('perfis').select('id').eq('org_id',orgId)).data||[];
    for(const p of ps){try{await chamarFn('criar-membro',{acao:'remover',authId:p.id});}catch(e){}}
    await sb.from('organizacoes').delete().eq('id',orgId);}catch(e){return toast('Erro ao excluir');}
  toast('Cliente excluído');showAdmin();}

  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doNovoCliente()">Criar cliente</button></div>`);

async function doNovoCliente(){

/* ===================== ANAMNESE / ONBOARDING (WIZARD) ===================== */
let wizState={step:1};
function wzGet(path){const ps=path.split('.');let o=DB;for(const p of ps){if(o==null)return undefined;o=o[p];}return o;}
function wzSetPath(path,val){const ps=path.split('.');let o=DB;for(let i=0;i<ps.length-1;i++){o[ps[i]]=o[ps[i]]||{};o=o[ps[i]];}o[ps[ps.length-1]]=val;save();}
function fNum(path,label,hint,recalc){const v=wzGet(path);return `<div class="field"><label>${label}${hint?` <span class="hint">${hint}</span>`:''}</label><input class="input" type="number" step="0.01" value="${(v!=null&&v!=='')?v:''}" placeholder="0,00" oninput="wzSetPath('${path}',parseFloat(this.value)||0)" ${recalc?'onchange="wizRender()"':''}></div>`;}
function fInt(path,label,hint,recalc){const v=wzGet(path);return `<div class="field"><label>${label}${hint?` <span class="hint">${hint}</span>`:''}</label><input class="input" type="number" step="1" value="${(v!=null&&v!=='')?v:''}" placeholder="0" oninput="wzSetPath('${path}',parseFloat(this.value)||0)" ${recalc?'onchange="wizRender()"':''}></div>`;}
function fMoney(path,label,hint,recalc){const v=wzGet(path)||0;return `<div class="field"><label>${label}${hint?` <span class="hint">${hint}</span>`:''}</label><div class="money-wrap"><span class="money-pre">R$</span><input class="input money-inp" inputmode="numeric" value="${fmtMoneyInput(v)}" oninput="wzSetPath('${path}',moneyMask(this))" ${recalc?'onchange="wizRender()"':''}></div></div>`;}
function fTxt(path,label,hint,ph){const v=wzGet(path);return `<div class="field"><label>${label}${hint?` <span class="hint">${hint}</span>`:''}</label><input class="input" value="${esc(v||'')}" placeholder="${ph||''}" oninput="wzSetPath('${path}',this.value)"></div>`;}
function fSel(path,label,opts){const v=wzGet(path)||'';return `<div class="field"><label>${label}</label><select class="input" onchange="wzSetPath('${path}',this.value)"><option value="">— selecione —</option>${opts.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select></div>`;}
function fSeg(path,label,opts){const v=wzGet(path);return `<div class="field"><label>${label}</label><div class="wiz-seg">${opts.map(o=>`<button type="button" class="${String(v)===String(o.v)?'on':''}" onclick="wzSetPath('${path}',${typeof o.v==='string'?`'${o.v}'`:o.v});wizRender()">${o.l}</button>`).join('')}</div></div>`;}
function fFoto(path,label){const v=wzGet(path);return `<div class="field"><label>${label} <span class="hint">opcional</span></label><div style="display:flex;align-items:center;gap:12px">${v?`<img src="${v}" style="width:54px;height:54px;border-radius:10px;object-fit:cover;border:1px solid var(--line)">`:''}<label class="btn btn-ghost btn-sm" style="cursor:pointer">${v?'Alterar':'Anexar'} foto<input type="file" accept="image/*" style="display:none" onchange="wzFoto('${path}',this)"></label>${v?`<button class="btn btn-ghost btn-sm" onclick="wzSetPath('${path}','');wizRender()">Remover</button>`:''}</div></div>`;}
function wzFoto(path,input){const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=128;let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));w=Math.round(w*sc);h=Math.round(h*sc);const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);wzSetPath(path,c.toDataURL('image/jpeg',0.8));wizRender();};img.src=r.result;};r.readAsDataURL(f);}
function wizAdd(arrPath,obj){const a=wzGet(arrPath);a.push(obj);save();wizRender();}
function wizDel(arrPath,idx){const a=wzGet(arrPath);a.splice(idx,1);save();wizRender();}
function subBox(title,inner,arrPath,idx){return `<div class="wiz-sub"><div class="sub-h">${title}</div><button class="mini-del" onclick="wizDel('${arrPath}',${idx})">${icoX}</button>${inner}</div>`;}

function abrirWizard(step){normData();wizState.step=step||wizState.step||1;let w=document.getElementById('wizScreen');if(!w){w=document.createElement('div');w.id='wizScreen';document.body.appendChild(w);}w.style.display='flex';wizRender();}
function fecharWizard(){const w=document.getElementById('wizScreen');if(w)w.style.display='none';}
function wizNav(d){const n=wizState.step+d;if(n<1)return;if(n>WIZ.length)return wizFinish();wizState.step=n;wizRender();window.scrollTo(0,0);}
function wizSalvarFechar(){syncAnamneseCustosFixos();save();fecharWizard();toast('Dados salvos');}
function wizSync(){const f=DB.fin;
  if((f.marketplaces||[]).length){f.comissaoIfood=f.marketplaces[0].comissao||f.comissaoIfood;const mix=f.marketplaces.reduce((s,m)=>s+(m.pctVendas||0),0);DB.fat.mixIfood=Math.min(100,mix);}
  const ops=(f.operadorasCartao||[]).filter(o=>o.taxaCredito);if(ops.length)f.taxaCartao=ops.reduce((s,o)=>s+(o.taxaCredito||0),0)/ops.length;
  syncAnamneseCustosFixos();} // espelha custos fixos da anamnese p/ aba Custos Fixos (faturamento vem só dos lançamentos)
function wizFinish(){wizSync();DB.onboardingFeito=true;save();fecharWizard();toast('Onboarding concluído! 🎉');go('dashboard');}
function wizRender(){const w=document.getElementById('wizScreen');if(!w)return;const i=wizState.step,step=WIZ[i-1];const pct=Math.round(i/WIZ.length*100);
  w.innerHTML=`<div class="wiz-top"><div class="wm serif">Flow <span class="by">by Lidera</span></div><div class="wiz-step-lbl">Passo ${i} de ${WIZ.length}</div></div>
  <div class="wiz-prog"><i style="width:${pct}%"></i></div>
  <div class="wiz-grupo">${step.g}</div>
  <div class="wiz-body"><div class="wiz-card">
    <div class="wiz-ctx"><div class="tag">CONTEXTO</div><h2>${step.t}</h2><p>${step.ctx}</p></div>
    <div class="wiz-resp"><div class="resp-lbl">Sua resposta</div>${step.body()}</div>
  </div></div>
  <div class="wiz-foot">${i>1?`<button class="btn btn-ghost" onclick="wizNav(-1)">← Voltar</button>`:''}<div class="spacer"></div><button class="btn btn-ghost" onclick="wizSalvarFechar()">Salvar e fechar</button><button class="btn btn-primary" onclick="wizNav(1)">${i===WIZ.length?'Concluir ✓':'Continuar →'}</button></div>`;}

applyTheme((function(){try{return localStorage.getItem('flow_theme')||'light';}catch(e){return 'light';}})());
if(sb)sb.auth.onAuthStateChange((event)=>{if(event==='PASSWORD_RECOVERY'){RECOVERY=true;telaNovaSenha();}});
bootApp();
